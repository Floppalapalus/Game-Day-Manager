<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Game Day">
<meta name="theme-color" content="#0F1D3D">
<title>Game Day Manager</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html{font-size:16px;-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF1F7;min-height:100vh;overscroll-behavior:none}
  input,textarea,select{font-size:16px!important;font-family:inherit}
  button{font-family:inherit}
  :root{
    --nv:#0F1D3D;--nvL:#1A2F5E;--gd:#D4A843;
    --gn:#1E8449;--gnL:#EDFAF1;
    --rd:#C0392B;--rdL:#FEF0EE;
    --bl:#2563EB;--blL:#EFF6FF;
    --am:#D97706;--amL:#FFFBEB;
    --pu:#6D28D9;--puL:#F5F3FF;
    --text:#111827;--muted:#6B7280;--subtle:#9CA3AF;
    --border:rgba(0,0,0,0.08);--borderM:rgba(0,0,0,0.14);
    --white:#FFFFFF;--surface:#F9FAFB;
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  #root{display:flex;flex-direction:column;min-height:100vh;max-width:520px;margin:0 auto}
  .app-header{background:var(--nv);padding:12px 16px;border-bottom:3px solid var(--gd);flex-shrink:0}
  .tab-bar{background:var(--nv);display:flex;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;padding-bottom:var(--safe-bottom)}
  .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:#556688;border-top:3px solid transparent;transition:all .2s;min-height:56px}
  .tab-item.active{color:var(--gd);border-top-color:var(--gd)}
  .tab-icon{font-size:18px;line-height:1}
  .tab-label{font-size:10px;font-weight:600;margin-top:3px}
  .page{flex:1;overflow-y:auto;padding:13px 12px 24px;-webkit-overflow-scrolling:touch}
  .card{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:10px}
  .sect{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin:14px 0 9px}
  .sect-line{flex:1;height:.5px;background:var(--border)}
  .sect-btn{font-size:11px;padding:5px 12px;border-radius:16px;border:.5px solid var(--border);background:var(--nv);color:var(--gd);font-weight:600;cursor:pointer;white-space:nowrap}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer;width:100%;border:none;font-family:inherit;transition:all .2s;min-height:52px}
  .btn-primary{background:var(--nv);color:var(--gd)}
  .btn-success{background:var(--gn);color:#fff}
  .btn-danger{background:var(--rd);color:#fff}
  .btn-ghost{background:var(--surface);border:.5px solid var(--border);color:var(--muted)}
  .btn-disabled{background:#e5e7eb;color:#9ca3af;cursor:default}
  .pitch{position:relative;width:100%;padding-bottom:148%;background:#2D5A27;border-radius:12px;overflow:hidden;user-select:none;margin-bottom:12px}
  .pitch svg{position:absolute;inset:0;width:100%;height:100%}
  .slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:10}
  .slot-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.35);transition:all .2s}
  .slot-name{background:rgba(15,29,61,.8);border-radius:3px;padding:1px 5px;max-width:44px;margin-top:3px}
  .slot-name span{display:block;font-size:8px;color:#fff;font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .modal-backdrop{position:fixed;inset:0;background:rgba(15,29,61,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-title{font-size:17px;font-weight:700;color:var(--nv)}
  .modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;flex-shrink:0;border:none;font-family:inherit}
  .player-chip{display:flex;align-items:center;gap:5px;background:var(--white);border:.5px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px;cursor:default}
  .pos-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
  .chip-name{font-size:11px;font-weight:600;color:var(--text)}
  .chip-pos{font-size:9px;color:var(--subtle)}
  .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
  .stat-grid{display:grid;gap:8px;margin-bottom:10px}
  .stat-box{background:var(--surface);border-radius:8px;padding:10px 8px;text-align:center}
  .stat-val{font-size:22px;font-weight:700;line-height:1.1}
  .stat-lbl{font-size:9px;color:var(--subtle);margin-top:2px}
  .input-field{width:100%;border:.5px solid var(--borderM);border-radius:8px;padding:11px 12px;font-size:16px;color:var(--text);background:var(--surface);outline:none;font-family:inherit}
  .input-field::placeholder{color:var(--subtle)}
  textarea.input-field{resize:none;line-height:1.5}
  .select-row{display:flex;gap:6px}
  .select-pill{flex:1;padding:9px 4px;border-radius:9px;cursor:pointer;text-align:center;font-weight:700;font-size:12px;transition:all .15s;border:.5px solid var(--border)}
  .toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--nv);color:var(--gd);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:400;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;animation:toastIn .2s ease}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .confirm-sheet{position:fixed;inset:0;background:rgba(15,29,61,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center}
  .confirm-box{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 16px;padding-bottom:calc(16px + var(--safe-bottom))}
  .score-big{font-size:56px;font-weight:700;color:var(--gd);letter-spacing:6px;font-variant-numeric:tabular-nums;line-height:1}
  .timer-big{font-size:34px;font-weight:700;font-variant-numeric:tabular-nums}
  .empty-state{text-align:center;padding:50px 24px}
  .empty-icon{font-size:48px;margin-bottom:14px}
  .empty-title{font-size:17px;font-weight:700;color:var(--muted);margin-bottom:7px}
  .empty-sub{font-size:13px;color:var(--subtle);line-height:1.5;margin-bottom:20px}
  .player-row{background:var(--white);border:.5px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px;cursor:pointer}
  .player-row.open{border-color:#93c5fd;border-width:1.5px;background:#F0F7FF}
  .player-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
  .pos-tag{font-size:9px;padding:1px 7px;border-radius:8px;font-weight:600}
  .event-row{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px}
  .sub-row{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .mins-badge{font-size:24px;font-weight:700;color:var(--nv);line-height:1}
  .mins-sub{font-size:9px;color:var(--subtle)}
  .profile-behavior{display:flex;gap:7px;padding:7px 10px;background:var(--surface);border-radius:8px;margin-bottom:5px}
  .beh-num{font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:16px}
  .beh-text{font-size:12px;color:var(--text);line-height:1.45}
  .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .pickr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .pickr-cell{padding:10px 5px;border-radius:9px;cursor:pointer;text-align:center;transition:all .15s;border:.5px solid var(--border);background:var(--surface)}
  .pickr-cell.sel{border-width:1.5px}
  .pickr-num{font-size:15px;font-weight:700;line-height:1}
  .pickr-name{font-size:10px;font-weight:600;margin-top:2px}
  .pickr-pos{font-size:9px;color:var(--subtle)}
  .history-row{background:var(--white);border:.5px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;cursor:pointer}
  @media(max-width:360px){.score-big{font-size:44px}.timer-big{font-size:28px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ─── Colors ──────────────────────────────────────────────────────────────────
const C={nv:"#0F1D3D",gd:"#D4A843",gn:"#1E8449",gnL:"#EDFAF1",rd:"#C0392B",rdL:"#FEF0EE",bl:"#2563EB",blL:"#EFF6FF",am:"#D97706",amL:"#FFFBEB",pu:"#6D28D9",puL:"#F5F3FF",text:"#111827",muted:"#6B7280",subtle:"#9CA3AF",border:"rgba(0,0,0,0.08)",white:"#FFFFFF",surface:"#F9FAFB"};
const POS_COLOR={GK:C.pu,DEF:C.bl,MID:C.gn,FWD:C.rd};
const POS_LABEL={GK:"Goalkeeper",DEF:"Defender",MID:"Midfielder",FWD:"Forward"};
const POS_ORDER=["GK","DEF","MID","FWD"];

// ─── US Soccer Positional Profiles ───────────────────────────────────────────
const PROFILES={
  GK:{color:C.pu,bg:C.puL,behaviors:["Shot stopping — set position, ready for all shot types","Short distribution — plays to defenders confidently under pressure","Long distribution — accurate service to switch play or relieve pressure","Sweeper-keeper — reads through balls, wins 1v1s outside the box","Communication — organizes defensive line, commands the box","Build-out role — acts as 11th field player in team possession"]},
  DEF:{color:C.bl,bg:C.blL,behaviors:["Distribution under pressure — receives and plays out with confidence","1v1 defending — delay, deny, dictate, win the ball cleanly","Defensive shape — maintains compact block, pressure-cover-balance","Recovery run — tracks runners, gets back behind the ball quickly","Aerial defending — times jump, wins header, clears decisively","Communication — organizes teammates, leads defensive line"]},
  MID:{color:C.gn,bg:C.gnL,behaviors:["Receiving between lines — shows to receive, protects the ball, turns","Vertical passing — plays through pressure, finds feet behind the press","Pressing trigger recognition — presses at the right moment in defense","Box arrival — late runs into finishing positions, arrives unmarked","Defensive recovery — transitions back to shape quickly after losing ball","Combination play — wall passes, overlaps, third-man combinations"]},
  FWD:{color:C.rd,bg:C.rdL,behaviors:["Timing of run — moves in behind at the right moment, stays onside","Central positioning — stays in the goal zone, resists drifting wide","Combination play — links with midfielders in tight spaces, wall passes","Pressing from front — applies immediate pressure on GK or CB","First touch under pressure — cushions and controls to create space","Finishing composure — stays calm and selects the right finish type"]},
};

// ─── Game Formats ─────────────────────────────────────────────────────────────
const FORMATS={
  "5v5":{dur:40,formations:{"1-2-1":[{id:"GK",l:"GK",x:50,y:86},{id:"RD",l:"D",x:70,y:66},{id:"LD",l:"D",x:30,y:66},{id:"CM",l:"M",x:50,y:44},{id:"ST",l:"F",x:50,y:20}],"2-2":[{id:"GK",l:"GK",x:50,y:86},{id:"RD",l:"D",x:70,y:66},{id:"LD",l:"D",x:30,y:66},{id:"RS",l:"F",x:68,y:26},{id:"LS",l:"F",x:32,y:26}]}},
  "7v7":{dur:50,formations:{"2-3-1":[{id:"GK",l:"GK",x:50,y:87},{id:"RD",l:"RD",x:72,y:71},{id:"LD",l:"LD",x:28,y:71},{id:"RM",l:"RM",x:76,y:50},{id:"CM",l:"CM",x:50,y:50},{id:"LM",l:"LM",x:24,y:50},{id:"ST",l:"ST",x:50,y:21}],"3-2-1":[{id:"GK",l:"GK",x:50,y:87},{id:"RD",l:"RD",x:76,y:71},{id:"CD",l:"CD",x:50,y:71},{id:"LD",l:"LD",x:24,y:71},{id:"RM",l:"RM",x:66,y:48},{id:"LM",l:"LM",x:34,y:48},{id:"ST",l:"ST",x:50,y:20}],"1-3-2":[{id:"GK",l:"GK",x:50,y:87},{id:"CB",l:"CB",x:50,y:72},{id:"RM",l:"RM",x:76,y:51},{id:"CM",l:"CM",x:50,y:51},{id:"LM",l:"LM",x:24,y:51},{id:"RF",l:"RF",x:67,y:21},{id:"LF",l:"LF",x:33,y:21}]}},
  "9v9":{dur:60,formations:{"3-3-2":[{id:"GK",l:"GK",x:50,y:87},{id:"RD",l:"RD",x:76,y:72},{id:"CD",l:"CD",x:50,y:72},{id:"LD",l:"LD",x:24,y:72},{id:"RM",l:"RM",x:76,y:51},{id:"CM",l:"CM",x:50,y:51},{id:"LM",l:"LM",x:24,y:51},{id:"RF",l:"RF",x:65,y:23},{id:"LF",l:"LF",x:35,y:23}],"3-2-3":[{id:"GK",l:"GK",x:50,y:87},{id:"RD",l:"RD",x:76,y:73},{id:"CD",l:"CD",x:50,y:73},{id:"LD",l:"LD",x:24,y:73},{id:"RM",l:"RM",x:66,y:52},{id:"LM",l:"LM",x:34,y:52},{id:"RW",l:"RW",x:78,y:23},{id:"ST",l:"ST",x:50,y:19},{id:"LW",l:"LW",x:22,y:23}],"4-3-1":[{id:"GK",l:"GK",x:50,y:87},{id:"RB",l:"RB",x:80,y:72},{id:"CB1",l:"CB",x:60,y:72},{id:"CB2",l:"CB",x:40,y:72},{id:"LB",l:"LB",x:20,y:72},{id:"RM",l:"RM",x:72,y:50},{id:"CM",l:"CM",x:50,y:50},{id:"LM",l:"LM",x:28,y:50},{id:"ST",l:"ST",x:50,y:20}]}},
  "11v11":{dur:70,formations:{"4-3-3":[{id:"GK",l:"GK",x:50,y:87},{id:"RB",l:"RB",x:82,y:71},{id:"CB1",l:"CB",x:62,y:71},{id:"CB2",l:"CB",x:38,y:71},{id:"LB",l:"LB",x:18,y:71},{id:"RM",l:"RM",x:78,y:51},{id:"CM",l:"CM",x:50,y:51},{id:"LM",l:"LM",x:22,y:51},{id:"RW",l:"RW",x:76,y:27},{id:"ST",l:"ST",x:50,y:20},{id:"LW",l:"LW",x:24,y:27}],"4-4-2":[{id:"GK",l:"GK",x:50,y:87},{id:"RB",l:"RB",x:82,y:71},{id:"CB1",l:"CB",x:62,y:71},{id:"CB2",l:"CB",x:38,y:71},{id:"LB",l:"LB",x:18,y:71},{id:"RM",l:"RM",x:80,y:50},{id:"CM1",l:"CM",x:60,y:50},{id:"CM2",l:"CM",x:40,y:50},{id:"LM",l:"LM",x:20,y:50},{id:"ST1",l:"ST",x:64,y:21},{id:"ST2",l:"ST",x:36,y:21}],"4-2-3-1":[{id:"GK",l:"GK",x:50,y:87},{id:"RB",l:"RB",x:82,y:71},{id:"CB1",l:"CB",x:62,y:71},{id:"CB2",l:"CB",x:38,y:71},{id:"LB",l:"LB",x:18,y:71},{id:"CDM1",l:"CM",x:62,y:57},{id:"CDM2",l:"CM",x:38,y:57},{id:"RAM",l:"AM",x:76,y:37},{id:"CAM",l:"AM",x:50,y:37},{id:"LAM",l:"AM",x:24,y:37},{id:"ST",l:"ST",x:50,y:20}],"3-5-2":[{id:"GK",l:"GK",x:50,y:87},{id:"CB1",l:"CB",x:70,y:72},{id:"CB2",l:"CB",x:50,y:72},{id:"CB3",l:"CB",x:30,y:72},{id:"RWB",l:"WB",x:88,y:52},{id:"CM1",l:"CM",x:68,y:52},{id:"CM2",l:"CM",x:50,y:52},{id:"CM3",l:"CM",x:32,y:52},{id:"LWB",l:"WB",x:12,y:52},{id:"ST1",l:"ST",x:64,y:22},{id:"ST2",l:"ST",x:36,y:22}]}},
};

// ─── Storage ──────────────────────────────────────────────────────────────────
const store={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

// ─── Utils ────────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const calcPlayingTime=(starters,log,gameSecs)=>{
  const times={};
  const entry={};
  starters.forEach(id=>{entry[id]=0;});
  const subs=log.filter(e=>e.type==="sub").sort((a,b)=>a.min-b.min);
  subs.forEach(ev=>{
    if(ev.outId&&entry[ev.outId]!==undefined){times[ev.outId]=(times[ev.outId]||0)+(ev.min-entry[ev.outId])*60;delete entry[ev.outId];}
    if(ev.inId){entry[ev.inId]=ev.min;}
  });
  const endMin=Math.floor(gameSecs/60);
  Object.entries(entry).forEach(([id,start])=>{times[id]=(times[id]||0)+(endMin-start)*60;});
  return times;
};

// ─── Shared UI ────────────────────────────────────────────────────────────────
function Toast({msg}){if(!msg)return null;return <div className="toast">{msg}</div>;}

function SectHead({label,action,onAction}){return(
  <div className="sect">
    <span>{label}</span><div className="sect-line"/>
    {action&&<button className="sect-btn" onClick={onAction}>{action}</button>}
  </div>
);}

function Confirm({title,msg,onConfirm,onCancel}){return(
  <div className="confirm-sheet" onClick={onCancel}>
    <div className="confirm-box" onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:18,fontWeight:700,color:C.nv,marginBottom:8}}>{title}</div>
      {msg&&<div style={{fontSize:14,color:C.muted,marginBottom:20,lineHeight:1.5}}>{msg}</div>}
      <div style={{display:"flex",gap:9}}>
        <button className="btn btn-ghost" style={{flex:1,minHeight:48}} onClick={onCancel}>Cancel</button>
        <button className="btn btn-success" style={{flex:2,minHeight:48}} onClick={onConfirm}>Confirm</button>
      </div>
    </div>
  </div>
);}

// ─── ROSTER TAB ───────────────────────────────────────────────────────────────
function RosterTab({players,setPlayers}){
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({name:"",jersey:"",pos:"MID",age:"",notes:""});
  const upd=f=>setForm(p=>({...p,...f}));

  const openAdd=()=>{setForm({name:"",jersey:"",pos:"MID",age:"",notes:""});setEditId(null);setModal(true);};
  const openEdit=p=>{setForm({name:p.name,jersey:p.jersey,pos:p.pos,age:p.age||"",notes:p.notes||""});setEditId(p.id);setModal(true);};
  const save=()=>{
    if(!form.name.trim())return;
    if(editId)setPlayers(prev=>prev.map(p=>p.id===editId?{...p,...form}:p));
    else setPlayers(prev=>[...prev,{id:uid(),...form,games:[]}]);
    setModal(false);
  };
  const remove=id=>{if(players.length>0)setPlayers(prev=>prev.filter(p=>p.id!==id));};

  const grouped=POS_ORDER.map(pos=>({pos,items:players.filter(p=>p.pos===pos).sort((a,b)=>(+a.jersey||99)-(+b.jersey||99))})).filter(g=>g.items.length);

  if(!players.length)return(
    <div>
      <div className="empty-state">
        <div className="empty-icon">👥</div>
        <div className="empty-title">No players yet</div>
        <div className="empty-sub">Add your squad to get started. You'll build game day lineups from your roster.</div>
        <button className="btn btn-primary" style={{maxWidth:220}} onClick={openAdd}>Add first player</button>
      </div>
      {modal&&<PlayerModal form={form} upd={upd} editId={editId} save={save} close={()=>setModal(false)}/>}
    </div>
  );

  return(
    <div>
      <div className="stat-grid" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        {[["Squad",players.length,C.nv],["GK",players.filter(p=>p.pos==="GK").length,C.pu],["DEF",players.filter(p=>p.pos==="DEF").length,C.bl],["MID",players.filter(p=>p.pos==="MID").length,C.gn],["FWD",players.filter(p=>p.pos==="FWD").length,C.rd]].slice(0,3).map(([l,v,c])=>(
          <div className="stat-box" key={l}><div className="stat-val" style={{color:c}}>{v}</div><div className="stat-lbl">{l}</div></div>
        ))}
      </div>
      {grouped.map(g=>(
        <div key={g.pos} style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:POS_COLOR[g.pos],letterSpacing:.5,marginBottom:7}}>{POS_LABEL[g.pos].toUpperCase()} · {g.items.length}</div>
          {g.items.map(p=>(
            <div key={p.id} style={{background:C.white,border:"0.5px solid var(--border)",borderRadius:11,padding:"12px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10}}>
              <div className="player-avatar" style={{background:POS_COLOR[p.pos]}}>{p.jersey||"?"}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:C.text}}>{p.name}</div>
                <div style={{fontSize:11,color:C.muted}}>{POS_LABEL[p.pos]}{p.age?` · Age ${p.age}`:""}</div>
                {p.notes&&<div style={{fontSize:11,color:C.subtle,marginTop:2,fontStyle:"italic"}}>{p.notes}</div>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button style={{padding:"7px 14px",borderRadius:7,border:"0.5px solid var(--border)",cursor:"pointer",fontSize:12,color:C.muted,background:C.surface,fontFamily:"inherit"}} onClick={()=>openEdit(p)}>Edit</button>
                <button style={{padding:"7px 12px",borderRadius:7,border:`0.5px solid ${C.rd}33`,cursor:"pointer",fontSize:13,color:C.rd,background:C.rdL,fontFamily:"inherit"}} onClick={()=>remove(p.id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      ))}
      <SectHead label={`${players.length} players`} action="+ Add player" onAction={openAdd}/>
      {modal&&<PlayerModal form={form} upd={upd} editId={editId} save={save} close={()=>setModal(false)}/>}
    </div>
  );
}

function PlayerModal({form,upd,editId,save,close}){return(
  <div className="modal-backdrop" onClick={close}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-header">
        <div className="modal-title">{editId?"Edit player":"Add player"}</div>
        <button className="modal-close" onClick={close}>✕</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 80px",gap:9,marginBottom:11}}>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:5}}>FULL NAME *</div>
          <input className="input-field" value={form.name} onChange={e=>upd({name:e.target.value})} placeholder="e.g. Jordan Cole" autoFocus/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:5}}>JERSEY</div>
          <input className="input-field" style={{textAlign:"center"}} value={form.jersey} onChange={e=>upd({jersey:e.target.value})} placeholder="9" type="number" inputMode="numeric"/>
        </div>
      </div>
      <div style={{marginBottom:11}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:5}}>POSITION</div>
        <div className="select-row">
          {POS_ORDER.map(p=>(
            <div key={p} className="select-pill" onClick={()=>upd({pos:p})}
              style={{background:form.pos===p?POS_COLOR[p]:C.surface,color:form.pos===p?"#fff":C.muted,borderColor:form.pos===p?POS_COLOR[p]:"var(--border)"}}>
              {p}
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:11}}>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:5}}>AGE</div>
          <input className="input-field" value={form.age} onChange={e=>upd({age:e.target.value})} placeholder="12" type="number" inputMode="numeric"/>
        </div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
        </div>
      </div>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:5}}>NOTES (optional)</div>
        <input className="input-field" value={form.notes} onChange={e=>upd({notes:e.target.value})} placeholder="Development focus, strengths..."/>
      </div>
      <div style={{display:"flex",gap:9}}>
        <button className="btn btn-ghost" style={{flex:1,minHeight:52}} onClick={close}>Cancel</button>
        <button className="btn" style={{flex:2,minHeight:52,background:form.name.trim()?C.nv:"#e5e7eb",color:form.name.trim()?C.gd:"#9ca3af"}} onClick={save}>{editId?"Save changes":"Add to squad"}</button>
      </div>
    </div>
  </div>
);}

// ─── GAME DAY TAB ─────────────────────────────────────────────────────────────
function GameDayTab({players,setGames}){
  const [phase,setPhase]=useState("plan");
  const [opp,setOpp]=useState("");
  const [date,setDate]=useState("");
  const [fmt,setFmt]=useState("11v11");
  const [form,setForm]=useState("4-3-3");
  const [lineup,setLineup]=useState({});
  const [pickerSlot,setPickerSlot]=useState(null);
  const [subPlan,setSubPlan]=useState([]);
  const [goals,setGoals]=useState(["","",""]);
  const [subPlanModal,setSubPlanModal]=useState(false);
  const [spForm,setSpForm]=useState({outId:"",inId:"",min:"",reason:""});
  // Live
  const [secs,setSecs]=useState(0);
  const [running,setRunning]=useState(false);
  const [liveLog,setLiveLog]=useState([]);
  const [onField,setOnField]=useState(new Set());
  const [subModal,setSubModal]=useState(false);
  const [goalModal,setGoalModal]=useState(false);
  const [subForm2,setSubForm2]=useState({outId:"",inId:""});
  const [goalForm,setGoalForm]=useState({scorerId:"",assistId:"",team:"us"});
  const [confirmEnd,setConfirmEnd]=useState(false);
  const [savedGame,setSavedGame]=useState(null);
  const [toast,setToast]=useState(null);
  const timerRef=useRef(null);
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2400);};

  useEffect(()=>{
    if(running)timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[running]);

  const fmtData=FORMATS[fmt];
  const slots=fmtData?.formations[form]||[];
  const assignedIds=Object.values(lineup).filter(Boolean);
  const startingIds=[...assignedIds];
  const currentOnField=onField.size>0?onField:new Set(startingIds);
  const usGoals=liveLog.filter(e=>e.type==="goal"&&e.team==="us").length;
  const themGoals=liveLog.filter(e=>e.type==="goal"&&e.team==="them").length;
  const curMin=Math.floor(secs/60);

  const startGame=()=>{
    if(!assignedIds.length){showToast("Assign at least one player first");return;}
    setOnField(new Set(startingIds));setRunning(true);setPhase("live");showToast("Game started ⚽");
  };

  const doEndGame=()=>{
    setRunning(false);setConfirmEnd(false);
    const ptimes=calcPlayingTime(startingIds,liveLog,secs);
    const us=liveLog.filter(e=>e.type==="goal"&&e.team==="us");
    const them=liveLog.filter(e=>e.type==="goal"&&e.team==="them");
    const g={id:uid(),date:date||new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),opponent:opp||"Unknown opponent",fmt,form,score:{us:us.length,them:them.length},result:us.length>them.length?"Won":us.length<them.length?"Lost":"Draw",duration:secs,lineup,gameGoals:goals,log:liveLog,playingTime:ptimes,starters:startingIds};
    setGames(prev=>[...prev,g]);setSavedGame(g);setPhase("report");showToast("Game saved ✓");
  };

  const doSub=()=>{
    if(!subForm2.outId||!subForm2.inId)return;
    const ev={id:uid(),type:"sub",min:curMin,outId:subForm2.outId,inId:subForm2.inId};
    setLiveLog(prev=>[...prev,ev]);
    setOnField(prev=>{const n=new Set(prev);n.delete(subForm2.outId);n.add(subForm2.inId);return n;});
    const outP=players.find(p=>p.id===subForm2.outId);const inP=players.find(p=>p.id===subForm2.inId);
    showToast(`🔄 ${inP?.name.split(" ")[0]||"?"} on · ${outP?.name.split(" ")[0]||"?"} off`);
    setSubModal(false);setSubForm2({outId:"",inId:""});
  };

  const doGoal=()=>{
    const ev={id:uid(),type:"goal",min:curMin,...goalForm};
    setLiveLog(prev=>[...prev,ev]);
    const sc=players.find(p=>p.id===goalForm.scorerId);
    showToast(goalForm.team==="us"?`⚽ GOAL! ${sc?.name.split(" ")[0]||""}`:"🔴 Goal conceded");
    setGoalModal(false);setGoalForm({scorerId:"",assistId:"",team:"us"});
  };

  const resetAll=()=>{setPhase("plan");setOpp("");setDate("");setLineup({});setSubPlan([]);setGoals(["","",""]);setLiveLog([]);setSecs(0);setRunning(false);setOnField(new Set());setSavedGame(null);};

  // ── PLAN ──────────────────────────────────────────────────────────────────
  if(phase==="plan")return(
    <div>
      <div className="card">
        <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:11}}>MATCH DETAILS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:11}}>
          <div>
            <div style={{fontSize:11,color:C.muted,marginBottom:5}}>OPPONENT</div>
            <input className="input-field" value={opp} onChange={e=>setOpp(e.target.value)} placeholder="e.g. Westport SC"/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.muted,marginBottom:5}}>DATE</div>
            <input className="input-field" value={date} onChange={e=>setDate(e.target.value)} placeholder="Jan 18"/>
          </div>
        </div>
        <div style={{marginBottom:11}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>FORMAT</div>
          <div className="select-row">
            {Object.keys(FORMATS).map(f=>(
              <div key={f} className="select-pill" onClick={()=>{setFmt(f);const ff=Object.keys(FORMATS[f].formations)[0];setForm(ff);setLineup({});}}
                style={{background:fmt===f?"var(--nv)":C.surface,color:fmt===f?C.gd:C.muted,borderColor:fmt===f?"var(--nv)":"var(--border)",fontSize:11}}>
                {f}
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>FORMATION</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.keys(fmtData?.formations||{}).map(f=>(
              <div key={f} onClick={()=>{setForm(f);setLineup({});}}
                style={{padding:"7px 14px",borderRadius:14,cursor:"pointer",background:form===f?C.nv:C.surface,color:form===f?C.gd:C.muted,border:`0.5px solid ${form===f?C.nv:"var(--border)"}`,fontSize:12,fontWeight:600}}>
                {f}
              </div>
            ))}
          </div>
        </div>
      </div>

      <SectHead label={`Lineup — ${assignedIds.length}/${slots.length} assigned`}/>
      {!players.length&&<div style={{background:C.amL,borderRadius:9,padding:"11px 13px",marginBottom:10,fontSize:13,color:C.am}}>Add players to your roster first, then build your lineup.</div>}
      {!!players.length&&<>
        <div className="pitch">
          <svg viewBox="0 0 100 148" style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
            <rect x="2" y="2" width="96" height="144" rx="2" fill="none" stroke="rgba(255,255,255,.2)" strokeWidth=".5"/>
            <line x1="2" y1="74" x2="98" y2="74" stroke="rgba(255,255,255,.18)" strokeWidth=".5"/>
            <circle cx="50" cy="74" r="11" fill="none" stroke="rgba(255,255,255,.13)" strokeWidth=".5"/>
            <rect x="20" y="2" width="60" height="21" fill="none" stroke="rgba(255,255,255,.13)" strokeWidth=".5"/>
            <rect x="20" y="125" width="60" height="21" fill="none" stroke="rgba(255,255,255,.13)" strokeWidth=".5"/>
          </svg>
          {slots.map(slot=>{
            const pid=lineup[slot.id];const p=pid?players.find(x=>x.id===pid):null;const empty=!pid;
            return(
              <div key={slot.id} className="slot" style={{left:`${slot.x}%`,top:`${slot.y}%`}} onClick={()=>setPickerSlot(slot.id)}>
                <div className="slot-circle" style={{width:empty?26:32,height:empty?26:32,background:empty?"rgba(255,255,255,.15)":"#1A2F5E",border:`2px solid ${empty?"rgba(255,255,255,.35)":C.gd}`}}>
                  {p?<><div style={{fontSize:10,fontWeight:700,color:C.gd,lineHeight:1}}>{p.jersey}</div><div style={{fontSize:6,color:"rgba(255,255,255,.7)",lineHeight:1}}>{slot.l}</div></>:<div style={{fontSize:9,color:"rgba(255,255,255,.4)"}}>+</div>}
                </div>
                {p?<div className="slot-name"><span>{p.name.split(" ")[0]}</span></div>:<div style={{marginTop:2,fontSize:7,color:"rgba(255,255,255,.3)",fontWeight:600}}>{slot.l}</div>}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:11,color:C.muted,marginBottom:7,fontWeight:700,letterSpacing:.5}}>BENCH — {players.filter(p=>!assignedIds.includes(p.id)).length}</div>
        <div className="tag-row" style={{marginBottom:12}}>
          {players.filter(p=>!assignedIds.includes(p.id)).map(p=>(
            <div key={p.id} className="player-chip">
              <div className="pos-dot" style={{background:POS_COLOR[p.pos]}}>{p.jersey}</div>
              <span className="chip-name">{p.name.split(" ")[0]}</span>
              <span className="chip-pos">{p.pos}</span>
            </div>
          ))}
          {!players.filter(p=>!assignedIds.includes(p.id)).length&&<div style={{fontSize:12,color:C.subtle,fontStyle:"italic"}}>All players in lineup</div>}
        </div>
      </>}

      <SectHead label="Sub plan" action="+ Add" onAction={()=>setSubPlanModal(true)}/>
      {!subPlan.length&&<div style={{fontSize:12,color:C.subtle,fontStyle:"italic",marginBottom:10}}>No planned subs yet.</div>}
      {subPlan.map((s,i)=>{const out=players.find(p=>p.id===s.outId);const inn=players.find(p=>p.id===s.inId);return(
        <div key={s.id} className="sub-row">
          <div style={{width:26,height:26,borderRadius:"50%",background:`${C.nv}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.nv,flexShrink:0}}>{i+1}</div>
          <div style={{flex:1,fontSize:13}}>
            <span style={{color:C.muted,fontSize:12}}>{s.min}'</span> · <span style={{color:C.rd,fontWeight:600}}>↓{out?.name.split(" ")[0]||"?"}</span> <span style={{color:C.gn,fontWeight:600}}>↑{inn?.name.split(" ")[0]||"?"}</span>
            {s.reason&&<div style={{fontSize:11,color:C.subtle,marginTop:2}}>{s.reason}</div>}
          </div>
          <button style={{padding:"5px 10px",border:`0.5px solid ${C.rd}33`,borderRadius:7,cursor:"pointer",fontSize:12,color:C.rd,background:C.rdL,fontFamily:"inherit"}} onClick={()=>setSubPlan(prev=>prev.filter(x=>x.id!==s.id))}>✕</button>
        </div>
      );})}

      <SectHead label="Game goals"/>
      <div className="card">
        <div style={{fontSize:12,color:C.muted,marginBottom:10}}>What are the 2-3 things you want to focus on as a team today?</div>
        {goals.map((g,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
            <div style={{width:22,height:22,borderRadius:"50%",background:C.nv,color:C.gd,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
            <input className="input-field" style={{flex:1}} value={g} onChange={e=>setGoals(prev=>{const n=[...prev];n[i]=e.target.value;return n;})}
              placeholder={["e.g. Counter-attack within 3 seconds","e.g. Defend set pieces with shape","e.g. Keep our defensive line organized"][i]}/>
          </div>
        ))}
      </div>

      <button className="btn" style={{minHeight:56,background:assignedIds.length?C.gn:"#e5e7eb",color:assignedIds.length?"#fff":"#9ca3af",marginTop:4,fontSize:17}} onClick={startGame}>
        ▶ Start game
      </button>
      {!assignedIds.length&&<div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:5}}>Assign players to start</div>}

      {/* Player picker */}
      {pickerSlot&&<div className="modal-backdrop" onClick={()=>setPickerSlot(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-header">
            <div className="modal-title">Assign — {slots.find(s=>s.id===pickerSlot)?.l||pickerSlot}</div>
            <button className="modal-close" onClick={()=>setPickerSlot(null)}>✕</button>
          </div>
          {lineup[pickerSlot]&&<div style={{display:"flex",alignItems:"center",gap:9,padding:"11px 13px",background:C.rdL,borderRadius:10,marginBottom:12,cursor:"pointer",border:`0.5px solid ${C.rd}33`}} onClick={()=>{setLineup(prev=>{const n={...prev};delete n[pickerSlot];return n;});setPickerSlot(null);}}>
            <span style={{fontSize:16}}>🚫</span><span style={{fontSize:14,fontWeight:600,color:C.rd}}>Clear — remove {players.find(p=>p.id===lineup[pickerSlot])?.name}</span>
          </div>}
          {POS_ORDER.map(pos=>{
            const avail=players.filter(p=>p.pos===pos&&(!assignedIds.includes(p.id)||p.id===lineup[pickerSlot]));
            if(!avail.length)return null;
            return(
              <div key={pos} style={{marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:POS_COLOR[pos],letterSpacing:.5,marginBottom:7}}>{POS_LABEL[pos].toUpperCase()}</div>
                <div className="pickr-grid">
                  {avail.map(p=>{const isCur=p.id===lineup[pickerSlot];const isUsed=assignedIds.includes(p.id)&&!isCur;return(
                    <div key={p.id} className={`pickr-cell${isCur?" sel":""}`}
                      style={{opacity:isUsed?.4:1,background:isCur?"#EBF4FF":C.surface,borderColor:isCur?"#93c5fd":"var(--border)"}}
                      onClick={()=>{if(!isUsed){setLineup(p2=>({...p2,[pickerSlot]:p.id}));setPickerSlot(null);}}}>
                      <div className="pickr-num" style={{color:isCur?"#1e40af":POS_COLOR[p.pos]}}>{p.jersey}</div>
                      <div className="pickr-name" style={{color:isCur?"#1e40af":C.text}}>{p.name.split(" ")[0]}</div>
                      <div className="pickr-pos">{p.pos}{isUsed?" · Lineup":""}</div>
                    </div>
                  );})}
                </div>
              </div>
            );
          })}
        </div>
      </div>}

      {/* Sub plan modal */}
      {subPlanModal&&<div className="modal-backdrop" onClick={()=>setSubPlanModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-header">
            <div className="modal-title">Planned substitution</div>
            <button className="modal-close" onClick={()=>setSubPlanModal(false)}>✕</button>
          </div>
          <div style={{marginBottom:11}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:5}}>MINUTE</div>
            <input className="input-field" value={spForm.min} onChange={e=>setSpForm(f=>({...f,min:e.target.value}))} type="number" inputMode="numeric" placeholder="e.g. 60"/>
          </div>
          <div style={{marginBottom:11}}>
            <div style={{fontSize:11,fontWeight:700,color:C.rd,marginBottom:7}}>PLAYER OFF</div>
            <div className="tag-row">{assignedIds.map(pid=>{const p=players.find(x=>x.id===pid);if(!p)return null;return(<div key={pid} onClick={()=>setSpForm(f=>({...f,outId:pid}))} style={{padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600,background:spForm.outId===pid?"#FEF0EE":C.surface,border:`0.5px solid ${spForm.outId===pid?C.rd:"var(--border)"}`,color:spForm.outId===pid?C.rd:C.text}}>{p.name.split(" ")[0]}</div>);})}</div>
          </div>
          <div style={{marginBottom:11}}>
            <div style={{fontSize:11,fontWeight:700,color:C.gn,marginBottom:7}}>PLAYER ON</div>
            <div className="tag-row">{players.filter(p=>!assignedIds.includes(p.id)).map(p=>(<div key={p.id} onClick={()=>setSpForm(f=>({...f,inId:p.id}))} style={{padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600,background:spForm.inId===p.id?"#EDFAF1":C.surface,border:`0.5px solid ${spForm.inId===p.id?C.gn:"var(--border)"}`,color:spForm.inId===p.id?C.gn:C.text}}>{p.name.split(" ")[0]}</div>))}</div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:5}}>REASON (optional)</div>
            <input className="input-field" value={spForm.reason} onChange={e=>setSpForm(f=>({...f,reason:e.target.value}))} placeholder="e.g. Fresh legs, tactical change..."/>
          </div>
          <button className="btn" style={{minHeight:52,background:spForm.outId&&spForm.inId?C.nv:"#e5e7eb",color:spForm.outId&&spForm.inId?C.gd:"#9ca3af"}}
            onClick={()=>{if(!spForm.outId||!spForm.inId)return;setSubPlan(prev=>[...prev,{id:uid(),...spForm,min:parseInt(spForm.min)||60}]);setSubPlanModal(false);setSpForm({outId:"",inId:"",min:"",reason:""});}}>
            Add to sub plan
          </button>
        </div>
      </div>}

      <Toast msg={toast}/>
    </div>
  );

  // ── LIVE ──────────────────────────────────────────────────────────────────
  if(phase==="live")return(
    <div>
      {/* Scoreboard */}
      <div style={{background:C.nv,borderRadius:14,padding:"18px 16px",marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:12,color:"rgba(255,255,255,.5)",fontWeight:700,letterSpacing:.5,marginBottom:6}}>{opp||"OPPONENT"} · {date||"TODAY"}</div>
        <div className="score-big">{usGoals} : {themGoals}</div>
        <div className="timer-big" style={{color:running?"#22c55e":C.gd,marginTop:8,marginBottom:14}}>{fmtTime(secs)}</div>
        <div style={{display:"flex",gap:9,justifyContent:"center"}}>
          <button style={{padding:"11px 22px",borderRadius:22,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",fontSize:14,fontWeight:600,color:"rgba(255,255,255,.8)",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setRunning(r=>!r)}>
            {running?"⏸ Pause":"▶ Resume"}
          </button>
          <button style={{padding:"11px 22px",borderRadius:22,background:C.gd,border:`1px solid ${C.gd}`,fontSize:14,fontWeight:700,color:C.nv,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setConfirmEnd(true)}>
            End game
          </button>
        </div>
      </div>

      {/* Game goals quick view */}
      {goals.filter(Boolean).length>0&&<div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:7}}>GAME GOALS</div>
        {goals.filter(Boolean).map((g,i)=><div key={i} style={{fontSize:13,color:C.text,marginBottom:3,display:"flex",gap:7}}><span style={{color:C.gd,fontWeight:700}}>·</span>{g}</div>)}
      </div>}

      {/* Action buttons */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <button style={{padding:"20px 10px",background:C.gnL,border:`2px solid ${C.gn}`,borderRadius:14,cursor:"pointer",textAlign:"center",fontFamily:"inherit"}} onClick={()=>setGoalModal("us")}>
          <div style={{fontSize:28,marginBottom:5}}>⚽</div>
          <div style={{fontSize:15,fontWeight:700,color:"#166534"}}>Our goal</div>
        </button>
        <button style={{padding:"20px 10px",background:C.rdL,border:`2px solid ${C.rd}`,borderRadius:14,cursor:"pointer",textAlign:"center",fontFamily:"inherit"}} onClick={()=>{setGoalForm({scorerId:"",assistId:"",team:"them"});setGoalModal("them");}}>
          <div style={{fontSize:24,marginBottom:5}}>🔴</div>
          <div style={{fontSize:15,fontWeight:700,color:"#991b1b"}}>Conceded</div>
        </button>
      </div>
      <button className="btn btn-primary" style={{marginBottom:12,minHeight:54,fontSize:16}} onClick={()=>setSubModal(true)}>
        🔄 Substitution
      </button>

      {/* Live log */}
      {liveLog.length>0&&<>
        <SectHead label="Events"/>
        {[...liveLog].reverse().map(ev=>{
          const sc=players.find(p=>p.id===ev.scorerId);const ap=players.find(p=>p.id===ev.assistId);
          const outP=players.find(p=>p.id===ev.outId);const inP=players.find(p=>p.id===ev.inId);
          return(
            <div key={ev.id} className="event-row">
              <span style={{fontSize:16,flexShrink:0}}>{ev.type==="goal"?(ev.team==="us"?"⚽":"🔴"):"🔄"}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{ev.type==="goal"?(ev.team==="us"?`${sc?.name||"?"}`:"Conceded"):`${inP?.name.split(" ")[0]||"?"} ↑ · ${outP?.name.split(" ")[0]||"?"} ↓`}</div>
                {ev.assistId&&<div style={{fontSize:11,color:C.muted}}>🅰️ {ap?.name.split(" ")[0]}</div>}
              </div>
              <div style={{fontSize:12,color:C.muted,fontWeight:600}}>{ev.min}'</div>
            </div>
          );
        })}
      </>}

      {/* On field */}
      <SectHead label={`On field — ${currentOnField.size}`}/>
      <div className="tag-row">
        {[...currentOnField].map(pid=>{const p=players.find(x=>x.id===pid);if(!p)return null;return(
          <div key={pid} className="player-chip" style={{background:C.gnL,border:`0.5px solid ${C.gn}33`}}>
            <div className="pos-dot" style={{background:POS_COLOR[p.pos]}}>{p.jersey}</div>
            <span className="chip-name">{p.name.split(" ")[0]}</span>
          </div>
        );})}
      </div>

      {/* Confirm end game sheet */}
      {confirmEnd&&<Confirm
        title="End game?"
        msg={`Final score: ${usGoals}–${themGoals} · ${Math.round(secs/60)} minutes played`}
        onConfirm={doEndGame}
        onCancel={()=>setConfirmEnd(false)}
      />}

      {/* Sub modal */}
      {subModal&&<div className="modal-backdrop" onClick={()=>setSubModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-header">
            <div className="modal-title">Substitution — {curMin}'</div>
            <button className="modal-close" onClick={()=>setSubModal(false)}>✕</button>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:C.rd,marginBottom:8}}>PLAYER OFF</div>
            <div className="pickr-grid">
              {[...currentOnField].map(pid=>{const p=players.find(x=>x.id===pid);if(!p)return null;const sel=subForm2.outId===pid;return(
                <div key={pid} className={`pickr-cell${sel?" sel":""}`} style={{background:sel?"#FEF0EE":C.surface,borderColor:sel?C.rd:"var(--border)"}} onClick={()=>setSubForm2(f=>({...f,outId:pid}))}>
                  <div className="pickr-num" style={{color:sel?C.rd:POS_COLOR[p.pos]}}>{p.jersey}</div>
                  <div className="pickr-name" style={{color:sel?C.rd:C.text}}>{p.name.split(" ")[0]}</div>
                  <div className="pickr-pos">{p.pos}</div>
                </div>
              );})}
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:C.gn,marginBottom:8}}>PLAYER ON — bench</div>
            {!players.filter(p=>!currentOnField.has(p.id)).length&&<div style={{fontSize:13,color:C.muted,fontStyle:"italic"}}>No bench players available</div>}
            <div className="pickr-grid">
              {players.filter(p=>!currentOnField.has(p.id)).map(p=>{const sel=subForm2.inId===p.id;return(
                <div key={p.id} className={`pickr-cell${sel?" sel":""}`} style={{background:sel?"#EDFAF1":C.surface,borderColor:sel?C.gn:"var(--border)"}} onClick={()=>setSubForm2(f=>({...f,inId:p.id}))}>
                  <div className="pickr-num" style={{color:sel?C.gn:POS_COLOR[p.pos]}}>{p.jersey}</div>
                  <div className="pickr-name" style={{color:sel?C.gn:C.text}}>{p.name.split(" ")[0]}</div>
                  <div className="pickr-pos">{p.pos}</div>
                </div>
              );})}
            </div>
          </div>
          <button className="btn" style={{minHeight:52,background:subForm2.outId&&subForm2.inId?C.nv:"#e5e7eb",color:subForm2.outId&&subForm2.inId?C.gd:"#9ca3af"}} onClick={doSub}>
            Confirm substitution
          </button>
        </div>
      </div>}

      {/* Goal modal */}
      {goalModal&&<div className="modal-backdrop" onClick={()=>setGoalModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-header">
            <div className="modal-title">{goalModal==="us"?"⚽ Goal scored":"🔴 Conceded"} — {curMin}'</div>
            <button className="modal-close" onClick={()=>setGoalModal(false)}>✕</button>
          </div>
          {goalModal==="us"&&<>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:8}}>SCORER</div>
              <div className="pickr-grid">
                {[...currentOnField].map(pid=>{const p=players.find(x=>x.id===pid);if(!p||p.pos==="GK")return null;const sel=goalForm.scorerId===pid;return(
                  <div key={pid} className={`pickr-cell${sel?" sel":""}`} style={{background:sel?"#EBF4FF":C.surface,borderColor:sel?"#93c5fd":"var(--border)"}} onClick={()=>setGoalForm(f=>({...f,scorerId:pid,team:"us"}))}>
                    <div className="pickr-num" style={{color:sel?"#1e40af":POS_COLOR[p.pos]}}>{p.jersey}</div>
                    <div className="pickr-name" style={{color:sel?"#1e40af":C.text}}>{p.name.split(" ")[0]}</div>
                    <div className="pickr-pos">{p.pos}</div>
                  </div>
                );})}
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:8}}>ASSIST (optional)</div>
              <div className="tag-row">
                {[...currentOnField].filter(pid=>pid!==goalForm.scorerId).map(pid=>{const p=players.find(x=>x.id===pid);if(!p)return null;const sel=goalForm.assistId===pid;return(
                  <div key={pid} onClick={()=>setGoalForm(f=>({...f,assistId:f.assistId===pid?"":pid}))} style={{padding:"9px 15px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,background:sel?"#EBF4FF":C.surface,border:`0.5px solid ${sel?"#93c5fd":"var(--border)"}`,color:sel?"#1e40af":C.text}}>
                    {p.name.split(" ")[0]}
                  </div>
                );})}
                <div onClick={()=>setGoalForm(f=>({...f,assistId:""}))} style={{padding:"9px 15px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,background:!goalForm.assistId?"#EBF4FF":C.surface,border:`0.5px solid ${!goalForm.assistId?"#93c5fd":"var(--border)"}`,color:!goalForm.assistId?"#1e40af":C.muted}}>No assist</div>
              </div>
            </div>
          </>}
          <button className="btn" style={{minHeight:52,background:(goalModal==="them"||goalForm.scorerId)?C.nv:"#e5e7eb",color:(goalModal==="them"||goalForm.scorerId)?C.gd:"#9ca3af"}} onClick={doGoal}>
            Log {goalModal==="us"?"goal":"conceded"}
          </button>
        </div>
      </div>}

      <Toast msg={toast}/>
    </div>
  );

  // ── REPORT ────────────────────────────────────────────────────────────────
  if(phase==="report"&&savedGame){
    return <PostGameReport game={savedGame} players={players} setPlayers={setP=>{}} onNewGame={resetAll}/>;
  }
  return null;
}

// ─── POST-GAME REPORT ─────────────────────────────────────────────────────────
function PostGameReport({game,players,setPlayers,onNewGame}){
  const [openPid,setOpenPid]=useState(null);
  const [idpNotes,setIdpNotes]=useState({});
  const [saved,setSaved]=useState(false);
  const [toast,setToast]=useState(null);
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2400);};

  const ptimes=game.playingTime||{};
  const logs=game.log||[];
  const us=logs.filter(e=>e.type==="goal"&&e.team==="us");
  const them=logs.filter(e=>e.type==="goal"&&e.team==="them");
  const subs=logs.filter(e=>e.type==="sub");
  const totalMins=Math.round(game.duration/60);

  const participantIds=[...new Set([...Object.keys(ptimes),...(game.starters||[])])];
  const sorted=participantIds.map(pid=>({pid,player:players.find(p=>p.id===pid),mins:Math.round((ptimes[pid]||0)/60)})).filter(x=>x.player).sort((a,b)=>b.mins-a.mins);

  const saveToProfiles=()=>{
    const updated=players.map(p=>{
      const mins=Math.round((ptimes[p.id]||0)/60);
      if(!mins)return p;
      const rec={id:game.id,date:game.date,opponent:game.opponent,result:game.result,mins,goals:us.filter(e=>e.scorerId===p.id).length,assists:us.filter(e=>e.assistId===p.id).length,idpNote:idpNotes[p.id]||""};
      return{...p,games:[...(p.games||[]),rec]};
    });
    // Pass updated players up
    const ev=new CustomEvent("gdm-save-players",{detail:updated});window.dispatchEvent(ev);
    setSaved(true);showToast("Saved to all player profiles ✓");
  };

  const rc=game.result==="Won"?C.gn:game.result==="Lost"?C.rd:C.am;
  return(
    <div>
      <div style={{background:C.nv,borderRadius:14,padding:"18px 16px",marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:12,color:"rgba(255,255,255,.5)",fontWeight:700,letterSpacing:.5,marginBottom:5}}>FULL TIME · {game.date}</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,.6)",marginBottom:6}}>vs {game.opponent}</div>
        <div className="score-big">{us.length} : {them.length}</div>
        <div style={{marginTop:10,display:"inline-block",padding:"6px 20px",borderRadius:20,fontSize:14,fontWeight:700,color:"#fff",background:rc}}>{game.result}</div>
        <div style={{marginTop:8,fontSize:11,color:"rgba(255,255,255,.4)"}}>{game.fmt} · {game.form} · {totalMins}' played</div>
      </div>

      {game.gameGoals?.filter(Boolean).length>0&&<div className="card">
        <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:8}}>GAME GOALS — HOW DID WE DO?</div>
        {game.gameGoals.filter(Boolean).map((g,i)=><div key={i} style={{display:"flex",gap:7,padding:"5px 0",borderBottom:i<game.gameGoals.filter(Boolean).length-1?"0.5px solid var(--border)":"none"}}><span style={{color:C.gd}}>·</span><span style={{fontSize:13,color:C.text,lineHeight:1.4}}>{g}</span></div>)}
      </div>}

      {(us.length>0||them.length>0)&&<>
        <SectHead label="Goals"/>
        {us.map(e=>{const sc=players.find(p=>p.id===e.scorerId);const ap=players.find(p=>p.id===e.assistId);return(
          <div key={e.id} className="event-row" style={{borderLeft:`3px solid ${C.gn}`}}>
            <span style={{fontSize:16}}>⚽</span>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>{sc?.name||"?"}</div>{ap&&<div style={{fontSize:11,color:C.muted}}>🅰️ {ap.name.split(" ")[0]}</div>}</div>
            <div style={{fontSize:12,color:C.muted,fontWeight:600}}>{e.min}'</div>
          </div>
        );})}
        {them.map((e,i)=>(
          <div key={e.id} className="event-row" style={{borderLeft:`3px solid ${C.rd}`}}>
            <span style={{fontSize:16}}>🔴</span>
            <div style={{flex:1,fontSize:14,fontWeight:600,color:C.rd}}>Conceded</div>
            <div style={{fontSize:12,color:C.muted,fontWeight:600}}>{e.min}'</div>
          </div>
        ))}
      </>}

      {subs.length>0&&<>
        <SectHead label="Substitutions"/>
        {subs.map(s=>{const out=players.find(p=>p.id===s.outId);const inn=players.find(p=>p.id===s.inId);return(
          <div key={s.id} className="sub-row">
            <span style={{fontSize:14}}>🔄</span>
            <div style={{flex:1,fontSize:13}}><span style={{color:C.gn,fontWeight:600}}>↑{inn?.name.split(" ")[0]||"?"}</span> · <span style={{color:C.rd,fontWeight:600}}>↓{out?.name.split(" ")[0]||"?"}</span></div>
            <div style={{fontSize:12,color:C.muted,fontWeight:600}}>{s.min}'</div>
          </div>
        );})}
      </>}

      <SectHead label="Playing time — tap to add IDP note"/>
      <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.5}}>Notes you add here save to each player's profile and feed into their development plan.</div>

      {sorted.map(({pid,player,mins})=>{
        const playerGoals=us.filter(e=>e.scorerId===pid).length;
        const playerAssists=us.filter(e=>e.assistId===pid).length;
        const subOut=subs.find(s=>s.outId===pid);const subIn=subs.find(s=>s.inId===pid);
        const profile=PROFILES[player.pos];
        const isOpen=openPid===pid;
        const isStarter=(game.starters||[]).includes(pid);
        return(
          <div key={pid} style={{background:C.white,border:"0.5px solid var(--border)",borderRadius:12,padding:"13px 14px",marginBottom:9}}>
            <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setOpenPid(isOpen?null:pid)}>
              <div className="player-avatar" style={{background:POS_COLOR[player.pos]}}>{player.jersey}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:C.text}}>{player.name}</div>
                <div className="tag-row" style={{marginTop:4,marginBottom:0}}>
                  <span className="badge" style={{background:isStarter?C.gnL:C.amL,color:isStarter?C.gn:C.am}}>{isStarter?"Starter":"Sub"}</span>
                  {subOut&&<span style={{fontSize:10,color:C.muted}}>Off {subOut.min}'</span>}
                  {subIn&&<span style={{fontSize:10,color:C.muted}}>On {subIn.min}'</span>}
                  {idpNotes[pid]&&<span className="badge" style={{background:C.blL,color:C.bl}}>Note added ✓</span>}
                </div>
                {(playerGoals>0||playerAssists>0)&&<div className="tag-row" style={{marginTop:5,marginBottom:0}}>
                  {playerGoals>0&&<span style={{fontSize:12,fontWeight:700,color:C.gn}}>⚽ {playerGoals}</span>}
                  {playerAssists>0&&<span style={{fontSize:12,fontWeight:700,color:C.bl}}>🅰️ {playerAssists}</span>}
                </div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div className="mins-badge">{mins}'</div>
                <div className="mins-sub">played</div>
              </div>
            </div>
            {isOpen&&<div style={{marginTop:12,borderTop:"0.5px solid var(--border)",paddingTop:12}}>
              {profile&&<>
                <div style={{fontSize:10,fontWeight:700,color:profile.color,letterSpacing:.5,marginBottom:7}}>{POS_LABEL[player.pos].toUpperCase()} — POSITIONAL PROFILE</div>
                <div style={{background:profile.bg,borderRadius:9,padding:"11px 12px",marginBottom:12,border:`0.5px solid ${profile.color}22`}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:7}}>Observable behaviors for this position — use these to inform your note:</div>
                  {profile.behaviors.map((b,i)=>(
                    <div key={i} className="profile-behavior">
                      <span className="beh-num" style={{color:profile.color}}>{i+1}</span>
                      <span className="beh-text">{b}</span>
                    </div>
                  ))}
                </div>
              </>}
              <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:6}}>IDP NOTE — saves to player profile</div>
              <textarea className="input-field" style={{height:80}} value={idpNotes[pid]||""} onChange={e=>setIdpNotes(prev=>({...prev,[pid]:e.target.value}))}
                placeholder={`What did you observe from ${player.name.split(" ")[0]} today? Use the positional profile above to guide your notes.`}/>
              {player.games?.length>0&&<div style={{background:"#FFFBEB",borderRadius:9,padding:"10px 12px",marginTop:8,border:"0.5px solid #fcd34d"}}>
                <div style={{fontSize:10,fontWeight:700,color:C.am,marginBottom:6}}>PREVIOUS GAMES</div>
                {player.games.slice(-3).reverse().map((g,i)=>(
                  <div key={i} style={{fontSize:12,marginBottom:5,paddingBottom:5,borderBottom:i<Math.min(2,player.games.length-1)?"0.5px solid #fcd34d33":"none"}}>
                    <span style={{fontWeight:600}}>{g.date} vs {g.opponent}</span>
                    <span style={{color:g.result==="Won"?C.gn:g.result==="Lost"?C.rd:C.am,marginLeft:7}}>{g.result}</span>
                    <span style={{color:C.muted,marginLeft:7}}>{g.mins}'</span>
                    {g.goals>0&&<span style={{color:C.gn,marginLeft:6}}>{g.goals}G</span>}
                    {g.assists>0&&<span style={{color:C.bl,marginLeft:4}}>{g.assists}A</span>}
                    {g.idpNote&&<div style={{color:C.muted,fontStyle:"italic",marginTop:2,fontSize:11}}>"{g.idpNote}"</div>}
                  </div>
                ))}
              </div>}
            </div>}
          </div>
        );
      })}

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:9,marginTop:8}}>
        <button className="btn" style={{minHeight:52,background:saved?C.gn:"var(--nv)",color:saved?"#fff":"var(--gd)",transition:"all .3s"}} onClick={saveToProfiles}>
          {saved?"✓ Saved to profiles":"Save to profiles"}
        </button>
        <button className="btn btn-ghost" style={{minHeight:52}} onClick={onNewGame}>New game</button>
      </div>
      <Toast msg={toast}/>
    </div>
  );
}

// ─── PROFILES TAB ─────────────────────────────────────────────────────────────
function ProfilesTab({players}){
  const [openId,setOpenId]=useState(null);
  if(!players.length)return(
    <div className="empty-state">
      <div className="empty-icon">👤</div>
      <div className="empty-title">No profiles yet</div>
      <div className="empty-sub">Add players and complete some games to build player profiles with development notes.</div>
    </div>
  );
  const grouped=POS_ORDER.map(pos=>({pos,items:players.filter(p=>p.pos===pos).sort((a,b)=>(+a.jersey||99)-(+b.jersey||99))})).filter(g=>g.items.length);
  return(
    <div>
      {grouped.map(g=>(
        <div key={g.pos} style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:POS_COLOR[g.pos],letterSpacing:.5,marginBottom:8}}>{POS_LABEL[g.pos].toUpperCase()} · {g.items.length}</div>
          {g.items.map(p=>{
            const isOpen=openId===p.id;
            const games=p.games||[];
            const totalMins=games.reduce((t,g)=>t+(g.mins||0),0);
            const totalGoals=games.reduce((t,g)=>t+(g.goals||0),0);
            const totalAssists=games.reduce((t,g)=>t+(g.assists||0),0);
            const profile=PROFILES[p.pos];
            const recentNote=games.slice(-1)[0]?.idpNote;
            return(
              <div key={p.id} className={`player-row${isOpen?" open":""}`} onClick={()=>setOpenId(isOpen?null:p.id)}>
                <div className="player-avatar" style={{background:POS_COLOR[p.pos]}}>{p.jersey}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:C.text}}>{p.name}</div>
                  <div style={{fontSize:12,color:C.muted}}>{POS_LABEL[p.pos]}{p.age?` · Age ${p.age}`:""}</div>
                  {(totalGoals>0||totalAssists>0)&&<div className="tag-row" style={{marginTop:4,marginBottom:0}}>
                    {totalGoals>0&&<span style={{fontSize:12,fontWeight:700,color:C.gn}}>⚽ {totalGoals}</span>}
                    {totalAssists>0&&<span style={{fontSize:12,fontWeight:700,color:C.bl}}>🅰️ {totalAssists}</span>}
                    <span style={{fontSize:11,color:C.subtle}}>{totalMins}' total</span>
                  </div>}
                </div>
                <div style={{textAlign:"right"}}>
                  {games.length?<><div style={{fontSize:13,fontWeight:700,color:C.nv}}>{games.length} game{games.length!==1?"s":""}</div><div style={{fontSize:10,color:C.subtle}}>{totalMins}' played</div></>:<div style={{fontSize:11,color:C.subtle}}>No games</div>}
                </div>
                {isOpen&&<div style={{position:"absolute",right:14,top:16,fontSize:12,color:C.muted}}>▲</div>}

                {isOpen&&<div style={{width:"100%",marginTop:12,borderTop:"0.5px solid var(--border)",paddingTop:12}} onClick={e=>e.stopPropagation()}>
                  {profile&&<>
                    <div style={{fontSize:10,fontWeight:700,color:profile.color,letterSpacing:.5,marginBottom:8}}>{POS_LABEL[p.pos].toUpperCase()} POSITIONAL PROFILE</div>
                    <div style={{background:profile.bg,borderRadius:10,padding:"12px",marginBottom:12,border:`0.5px solid ${profile.color}22`}}>
                      {profile.behaviors.map((b,i)=>(
                        <div key={i} className="profile-behavior" style={{background:"transparent"}}>
                          <span className="beh-num" style={{color:profile.color}}>{i+1}</span>
                          <span className="beh-text">{b}</span>
                        </div>
                      ))}
                    </div>
                  </>}
                  {p.notes&&<div style={{background:"#FFFBEB",borderRadius:9,padding:"10px 12px",marginBottom:10,border:"0.5px solid #fcd34d"}}><div style={{fontSize:10,fontWeight:700,color:C.am,marginBottom:4}}>COACH NOTES</div><div style={{fontSize:13,color:C.text,lineHeight:1.5,fontStyle:"italic"}}>"{p.notes}"</div></div>}
                  {recentNote&&<div style={{background:C.blL,borderRadius:9,padding:"10px 12px",marginBottom:10,border:`0.5px solid ${C.bl}33`}}><div style={{fontSize:10,fontWeight:700,color:C.bl,marginBottom:4}}>LATEST IDP NOTE</div><div style={{fontSize:13,color:C.text,lineHeight:1.5,fontStyle:"italic"}}>"{recentNote}"</div><div style={{fontSize:10,color:C.muted,marginTop:3}}>From: {games.slice(-1)[0]?.date} vs {games.slice(-1)[0]?.opponent}</div></div>}
                  {games.length>0&&<><div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:8}}>GAME HISTORY</div>
                    {games.slice().reverse().map((g,i)=>(
                      <div key={i} style={{display:"flex",gap:9,padding:"9px 0",borderBottom:i<games.length-1?"0.5px solid var(--border)":"none",alignItems:"flex-start"}}>
                        <div style={{width:30,height:30,borderRadius:"50%",background:g.result==="Won"?C.gnL:g.result==="Lost"?C.rdL:C.amL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:g.result==="Won"?C.gn:g.result==="Lost"?C.rd:C.am,flexShrink:0}}>{g.result==="Won"?"W":g.result==="Lost"?"L":"D"}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:C.text}}>{g.date} · {g.opponent}</div>
                          <div style={{fontSize:11,color:C.muted}}>{g.mins}' played{g.goals>0?` · ${g.goals}G`:""}  {g.assists>0?`${g.assists}A`:""}</div>
                          {g.idpNote&&<div style={{fontSize:11,color:C.bl,fontStyle:"italic",marginTop:2}}>"{g.idpNote}"</div>}
                        </div>
                      </div>
                    ))}
                  </>}
                  {!games.length&&<div style={{fontSize:12,color:C.subtle,fontStyle:"italic",textAlign:"center",padding:"10px 0"}}>No games played yet.</div>}
                </div>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ─── HISTORY TAB ─────────────────────────────────────────────────────────────
function HistoryTab({games,players}){
  const [openId,setOpenId]=useState(null);
  if(!games.length)return(
    <div className="empty-state">
      <div className="empty-icon">📅</div>
      <div className="empty-title">No games yet</div>
      <div className="empty-sub">Complete a game in the Game Day tab to see your history here.</div>
    </div>
  );
  const wins=games.filter(g=>g.result==="Won").length;
  const totalGoals=games.reduce((t,g)=>t+(g.score?.us||0),0);
  return(
    <div>
      <div className="stat-grid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
        {[["Games",games.length,C.nv],["Wins",wins,C.gn],["Win%",games.length?Math.round(wins/games.length*100)+"%":"—",C.gd],["Goals",totalGoals,C.bl]].map(([l,v,c])=>(
          <div className="stat-box" key={l}><div className="stat-val" style={{color:c,fontSize:18}}>{v}</div><div className="stat-lbl">{l}</div></div>
        ))}
      </div>
      {[...games].reverse().map(g=>{
        const isOpen=openId===g.id;const us=g.log.filter(e=>e.type==="goal"&&e.team==="us");const them=g.log.filter(e=>e.type==="goal"&&e.team==="them");const subs=g.log.filter(e=>e.type==="sub");const ptimes=g.playingTime||{};
        return(
          <div key={g.id} className="history-row" onClick={()=>setOpenId(isOpen?null:g.id)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:3}}>vs {g.opponent}</div>
                <div style={{fontSize:12,color:C.muted}}>{g.date} · {g.fmt} · {g.form}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:8}}>
                <div style={{fontSize:20,fontWeight:700,color:g.result==="Won"?C.gn:g.result==="Lost"?C.rd:C.am}}>{us.length}–{them.length}</div>
                <span className="badge" style={{background:g.result==="Won"?C.gnL:g.result==="Lost"?C.rdL:C.amL,color:g.result==="Won"?C.gn:g.result==="Lost"?C.rd:C.am}}>{g.result}</span>
              </div>
            </div>
            {isOpen&&<div style={{marginTop:10,borderTop:"0.5px solid var(--border)",paddingTop:10}}>
              {g.gameGoals?.filter(Boolean).length>0&&<div style={{marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:5}}>GAME GOALS</div>{g.gameGoals.filter(Boolean).map((gg,i)=><div key={i} style={{fontSize:12,color:C.text,marginBottom:3}}>· {gg}</div>)}</div>}
              {us.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:5}}>GOALS SCORED</div>{us.map(e=>{const sc=players.find(p=>p.id===e.scorerId);const ap=players.find(p=>p.id===e.assistId);return(<div key={e.id} style={{fontSize:12,color:C.text,marginBottom:3}}>⚽ {sc?.name||"?"} {e.min}'{ap?` · 🅰️${ap.name.split(" ")[0]}`:""}</div>);})}</div>}
              {subs.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:5}}>SUBS</div>{subs.map(s=>{const out=players.find(p=>p.id===s.outId);const inn=players.find(p=>p.id===s.inId);return(<div key={s.id} style={{fontSize:12,color:C.text,marginBottom:3}}>🔄 {inn?.name.split(" ")[0]||"?"} ↑ · {out?.name.split(" ")[0]||"?"} ↓ · {s.min}'</div>);})}</div>}
              <div><div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.5,marginBottom:7}}>PLAYING TIME</div>
                <div className="tag-row">{Object.entries(ptimes).sort((a,b)=>b[1]-a[1]).map(([pid,secs])=>{const p=players.find(x=>x.id===pid);if(!p)return null;const mins=Math.round(secs/60);return(<div key={pid} className="player-chip" key={pid}><div className="pos-dot" style={{background:POS_COLOR[p.pos]}}>{p.jersey}</div><span className="chip-name">{p.name.split(" ")[0]}</span><span style={{fontSize:11,fontWeight:700,color:C.nv}}>{mins}'</span></div>);})}</div>
              </div>
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("gameday");
  const [players,setPlayers]=useState(()=>store.get("gdm_players_v2")||[]);
  const [games,setGames]=useState(()=>store.get("gdm_games_v2")||[]);
  const [teamName,setTeamName]=useState(()=>store.get("gdm_team")||"My Team");
  const [editTeam,setEditTeam]=useState(false);

  useEffect(()=>store.set("gdm_players_v2",players),[players]);
  useEffect(()=>store.set("gdm_games_v2",games),[games]);
  useEffect(()=>store.set("gdm_team",teamName),[teamName]);

  // Listen for player saves from PostGameReport
  useEffect(()=>{
    const handler=e=>setPlayers(e.detail);
    window.addEventListener("gdm-save-players",handler);
    return()=>window.removeEventListener("gdm-save-players",handler);
  },[]);

  const TABS=[{id:"gameday",label:"Game Day",icon:"⚽"},{id:"roster",label:"Roster",icon:"👥"},{id:"profiles",label:"Profiles",icon:"👤"},{id:"history",label:"History",icon:"📅"}];

  return(
    <div id="app" style={{display:"flex",flexDirection:"column",height:"100dvh",maxWidth:520,margin:"0 auto",background:"var(--nvXL, #EEF1F7)"}}>
      {/* Header */}
      <div className="app-header" style={{flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,background:C.gd,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,color:C.nv,flexShrink:0}}>⚽</div>
          <div style={{flex:1,cursor:"pointer"}} onClick={()=>setEditTeam(e=>!e)}>
            <div style={{fontSize:15,fontWeight:700,color:C.gd}}>{teamName} <span style={{fontSize:10,opacity:.5}}>▾</span></div>
            <div style={{fontSize:10,color:"#8899BB"}}>{players.length} players · {games.length} games</div>
          </div>
        </div>
        {editTeam&&<div style={{display:"flex",gap:8,marginTop:9}}>
          <input style={{flex:1,background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",borderRadius:8,padding:"9px 11px",fontSize:15,color:"#fff",outline:"none",fontFamily:"inherit"}} value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="Team name" autoFocus/>
          <button style={{padding:"9px 16px",background:C.gd,borderRadius:8,color:C.nv,fontWeight:700,fontSize:13,cursor:"pointer",border:"none",fontFamily:"inherit"}} onClick={()=>setEditTeam(false)}>Save</button>
        </div>}
      </div>

      {/* Scrollable page content */}
      <div className="page" style={{flex:1,minHeight:0}}>
        {tab==="gameday" &&<GameDayTab players={players} setGames={g=>{setGames(typeof g==="function"?g(games):g);}}/>}
        {tab==="roster"  &&<RosterTab  players={players} setPlayers={setPlayers}/>}
        {tab==="profiles"&&<ProfilesTab players={players}/>}
        {tab==="history" &&<HistoryTab games={games} players={players}/>}
      </div>

      {/* Bottom tab bar */}
      <div className="tab-bar">
        {TABS.map(t=>(
          <div key={t.id} className={`tab-item${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            <div className="tab-icon">{t.icon}</div>
            <div className="tab-label">{t.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
