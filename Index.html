.hdr-logo{width:34px;height:34px;background:var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--nv);font-size:16px;font-weight:800;flex-shrink:0;}

.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.sync-dot.offline{background:#6b7280;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.scroll-area{flex:1;overflow-y:auto;padding:13px 12px;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 16px);-webkit-overflow-scrolling:touch;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--nv);display:flex;border-top:1px solid rgba(255,255,255,0.1);padding-bottom:var(--safe-b);z-index:100;}

.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:9px;font-weight:600;margin-top:3px;color:#556688;letter-spacing:0.3px;}
.nav-item.active .nav-label{color:var(--gd);}
.nav-item.active .nav-icon{transform:scale(1.1);}
.card{background:var(--wh);border:0.5px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:10px;}

.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;display:inline-block;}
.btn-primary{width:100%;padding:15px;background:var(--nv);border-radius:12px;color:var(--gd);font-weight:700;font-size:16px;text-align:center;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:active{opacity:0.8;}
.btn-primary.green{background:var(--gn);color:#fff;}
.btn-primary.disabled{background:#e5e7eb;color:#9ca3af;cursor:default;}
.btn-outline{padding:11px;background:var(--sf);border:0.5px solid var(--br);border-radius:9px;text-align:center;cursor:pointer;font-size:13px;color:var(--mu);font-weight:600;font-family:inherit;border:none;}
input,textarea{font-family:inherit;}
input[type=text],input[type=number],textarea{border:0.5px solid var(--brm);border-radius:8px;padding:10px 12px;font-size:16px;color:var(--tx);background:var(--sf);outline:none;width:100%;-webkit-appearance:none;}
.field-label{font-size:10px;color:var(--mu);margin-bottom:4px;font-weight:700;letter-spacing:0.5px;}

.chip{display:inline-flex;align-items:center;gap:5px;background:var(--wh);border:0.5px solid var(--br);border-radius:16px;padding:4px 10px 4px 4px;}

.stat-box{background:var(--sf);border-radius:8px;padding:9px 8px;text-align:center;}
.stat-val{font-size:20px;font-weight:700;}
.stat-lbl{font-size:9px;color:var(--su);margin-top:1px;}
.sel-btn{padding:8px 4px;border-radius:8px;cursor:pointer;text-align:center;border:none;font-family:inherit;}

  DEF:{color:'#2563EB',bg:'#EFF6FF',label:'Defender',behaviors:['Distribution under pressure — receives and plays out with confidence','1v1 defending — delay, deny, dictate, win the ball cleanly','Defensive shape — maintains compact block, pressure-cover-balance','Recovery run — tracks runners, gets back behind the ball quickly','Aerial defending — times jump, wins header, clears decisively','Communication — organizes teammates, leads defensive line']},
  MID:{color:'#1E8449',bg:'#EDFAF1',label:'Midfielder',behaviors:['Receiving between lines — shows to receive, protects ball, turns','Vertical passing — plays through pressure, finds feet behind the press','Pressing trigger recognition — presses at the right moment','Box arrival — late runs into finishing positions, arrives unmarked','Defensive recovery — transitions back to shape after losing ball','Combination play — wall passes, overlaps, third-man combinations']},
  FWD:{color:'#C0392B',bg:'#FEF0EE',label:'Forward',behaviors:['Timing of run — moves in behind at the right moment, stays onside','Central positioning — stays in goal zone, resists drifting wide','Combination play — links with midfielders in tight spaces','Pressing from front — applies immediate pressure on GK or CB','First touch under pressure — cushions and controls to create space','Finishing composure — stays calm, selects the right finish type']},
};

function posColor(p){return{GK:'#6D28D9',DEF:'#2563EB',MID:'#1E8449',FWD:'#C0392B'}[p]||'#0F1D3D';}
function posLabel(p){return PROFILES[p]?.label||p;}
function uid(){return Math.random().toString(36).slice(2,9);}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function computePlayingTime(starters,log,gameSecs){
  const times={},entry={},onField=new Set(starters);
  starters.forEach(id=>{entry[id]=0;});
  log.filter(e=>e.type==='sub').sort((a,b)=>a.min-b.min).forEach(ev=>{
    if(ev.outId&&entry[ev.outId]!==undefined){
      times[ev.outId]=(times[ev.outId]||0)+Math.max(0,ev.min-entry[ev.outId])*60;
      delete entry[ev.outId]; onField.delete(ev.outId);
    }
    if(ev.inId){entry[ev.inId]=ev.min;onField.add(ev.inId);}
  });
  const endMin=Math.floor(gameSecs/60);
  onField.forEach(id=>{if(entry[id]!==undefined)times[id]=(times[id]||0)+Math.max(0,endMin-entry[id])*60;});
  return times;
}

// ─── CLOUD SYNC ───────────────────────────────────────────────────────────────
let syncTimeout=null;

function scheduleSync(){
  if(!cloudEnabled()) return;
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(syncToCloud,2000);
}

async function syncToCloud(){
  if(!cloudEnabled()||!S.coachId) return;
  S.syncStatus='syncing'; updateSyncDot();
  try{
    const payload={
      coach_id:S.coachId,
      data:{players:S.players,games:S.games,teamName:S.teamName},
      updated_at:new Date().toISOString()
    };
    const res=await fetch(`${SUPABASE_URL}/rest/v1/coach_data`,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY,
        'Authorization':`Bearer ${SUPABASE_KEY}`,
        'Prefer':'resolution=merge-duplicates'
      },
      body:JSON.stringify(payload)
    });
    if(res.ok){S.syncStatus='synced';}
    else{S.syncStatus='error';}
  }catch(e){S.syncStatus='error';}
  updateSyncDot();
}

async function loadFromCloud(coachId){
  if(!cloudEnabled()||!coachId) return null;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/coach_data?coach_id=eq.${encodeURIComponent(coachId)}&select=data`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) return null;
    const rows=await res.json();
    return rows.length>0?rows[0].data:null;
  }catch(e){return null;}
}

function updateSyncDot(){
  const dot=document.getElementById('sync-dot');
  if(!dot) return;
  dot.className='sync-dot '+(cloudEnabled()?S.syncStatus:'offline');
  const lbl=document.getElementById('sync-label');
  if(lbl){
    const labels={synced:'Saved to cloud',syncing:'Saving…',error:'Sync error — check settings',offline:'Cloud backup off'};
    lbl.textContent=labels[cloudEnabled()?S.syncStatus:'offline']||'';
  }
}

// ─── PERSIST ──────────────────────────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('gdm_players',JSON.stringify(S.players));
    localStorage.setItem('gdm_games',JSON.stringify(S.games));
    localStorage.setItem('gdm_team',S.teamName);
    localStorage.setItem('gdm_coach_id',S.coachId);
  }catch(e){}
  scheduleSync();
}

function load(){
  try{
    const p=localStorage.getItem('gdm_players');if(p)S.players=JSON.parse(p);
    const g=localStorage.getItem('gdm_games');if(g)S.games=JSON.parse(g);
    const t=localStorage.getItem('gdm_team');if(t)S.teamName=t;
    const c=localStorage.getItem('gdm_coach_id');
    if(c){S.coachId=c;}
    else{
      // First run — generate a new sync code
      S.coachId=uid()+uid()+uid();
      localStorage.setItem('gdm_coach_id',S.coachId);
    }
  }catch(e){
    if(!S.coachId) S.coachId=uid()+uid()+uid();
  }
}

// ─── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData(){
  const data={
    version:1,exportedAt:new Date().toISOString(),
    teamName:S.teamName,coachId:S.coachId,
    players:S.players,games:S.games
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`gameday-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function handleImportFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.players) S.players=data.players;
      if(data.games)   S.games=data.games;
      if(data.teamName)S.teamName=data.teamName;
      save(); render();
      alert('Data imported successfully. Your roster and game history have been restored.');
    }catch(ex){alert('Could not read that file. Make sure it\'s a Game Day Manager backup (.json).');}
  };
  reader.readAsText(file);
  input.value='';
}

async function restoreFromCode(code){
  if(!code.trim()){S.restoreStatus='Enter a sync code first.';render();return;}
  if(!cloudEnabled()){S.restoreStatus='Cloud backup is not configured. Contact your coach educator.';render();return;}
  S.restoreStatus='Restoring…'; render();
  const data=await loadFromCloud(code.trim());
  if(!data){S.restoreStatus='No data found for that sync code. Check it and try again.';render();return;}
  if(data.players) S.players=data.players;
  if(data.games)   S.games=data.games;
  if(data.teamName)S.teamName=data.teamName;
  S.coachId=code.trim();
  S.restoreStatus=''; S.restoreCode='';
  save(); render();
  alert('Restored successfully! All your roster and game history is back.');
}

    <button class="sub-btn" onclick="openSubModal()">🔄 Make substitution <span id="live-min" style="font-size:12px;opacity:0.6">${min}'</span></button>
    ${S.liveLog.length>0?`<div class="sect"><span>EVENTS</span><div class="sect-line"></div></div>${[...S.liveLog].reverse().map(ev=>{const p=S.players.find(x=>x.id===ev.scorerId);const ap=S.players.find(x=>x.id===ev.assistId);const outp=S.players.find(x=>x.id===ev.outId);const inp=S.players.find(x=>x.id===ev.inId);return`<div class="event-card"><span style="font-size:16px">${ev.type==='goal'?(ev.team==='us'?'⚽':'🔴'):'🔄'}</span><div style="flex:1">${ev.type==='goal'?`<div style="font-size:13px;font-weight:600">${ev.team==='us'?`Goal — ${esc(p?.name||'?')}${ap?` · 🅰️${esc(ap.name.split(' ')[0])}`:''}`:' Conceded'}</div>`:''} ${ev.type==='sub'?`<div style="font-size:13px;font-weight:600">${esc(inp?.name.split(' ')[0]||'?')} ↑ · ${esc(outp?.name.split(' ')[0]||'?')} ↓</div>`:''}<div style="font-size:11px;color:var(--mu)">${ev.min}'</div></div></div>`;}).join('')}`:''}
    <div class="sect"><span>ON FIELD — ${[...S.onField].length}</span><div class="sect-line"></div></div>
    <div class="field-now-wrap">
      ${[...S.onField].map(pid=>{const p=S.players.find(x=>x.id===pid);if(!p)return'';return`<div class="chip" style="background:var(--gnl);border-color:rgba(30,132,73,0.3)"><div class="chip-jersey" style="background:${posColor(p.pos)}">${esc(p.jersey)}</div><span class="chip-name">${esc(p.name.split(' ')[0])}</span></div>`;}).join('')}
    </div>
  `;
}

// ─── REPORT ───────────────────────────────────────────────────────────────────
function buildReport(){
  const g=S.games.find(x=>x.id===S.activeGameId);
  if(!g)return`<div class="empty-state"><div style="font-size:44px">📋</div><div style="font-size:16px;font-weight:700;color:var(--mu);margin-top:12px">No report available</div></div>`;
  const us=g.log.filter(e=>e.type==='goal'&&e.team==='us');
  const them=g.log.filter(e=>e.type==='goal'&&e.team==='them');
  const subs=g.log.filter(e=>e.type==='sub');
  const ptimes=g.pt||{};
  const rc=g.result==='Won'?'var(--gn)':g.result==='Lost'?'var(--rd)':'var(--am)';
  const sorted=Object.keys(ptimes).map(pid=>({pid,player:S.players.find(p=>p.id===pid),mins:Math.round(ptimes[pid]/60)})).filter(x=>x.player).sort((a,b)=>b.mins-a.mins);
  return`
    <div class="report-hdr">
      <div style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.5px;margin-bottom:5px">FULL TIME · ${esc(g.date)}</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:5px">vs ${esc(g.opponent)}</div>
      <div class="report-score">${us.length} <span style="color:rgba(255,255,255,0.3);font-size:36px">:</span> ${them.length}</div>
      <div><span class="badge" style="background:${rc};color:#fff;font-size:14px;padding:5px 18px">${g.result}</span></div>
      <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:8px">${g.format} · ${g.formation} · ${Math.round(g.dur/60)}' played</div>
    </div>
    ${g.gameGoals?.filter(Boolean).length>0?`<div class="card"><div class="field-label" style="margin-bottom:8px">GAME GOALS</div>${g.gameGoals.filter(Boolean).map(gg=>`<div style="font-size:12px;color:var(--tx);margin-bottom:4px;display:flex;gap:6px"><span style="color:var(--gd)">·</span>${esc(gg)}</div>`).join('')}</div>`:''}
    ${us.length>0||them.length>0?`<div class="sect"><span>GOALS</span><div class="sect-line"></div></div>${us.map(e=>{const sc=S.players.find(p=>p.id===e.scorerId);const as=S.players.find(p=>p.id===e.assistId);return`<div class="event-card" style="border-left:3px solid var(--gn)"><span style="font-size:16px">⚽</span><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(sc?.name||'?')}${as?` · 🅰️ ${esc(as.name.split(' ')[0])}`:''}</div></div><div style="font-size:11px;color:var(--mu)">${e.min}'</div></div>`;}).join('')}${them.map(e=>`<div class="event-card" style="border-left:3px solid var(--rd)"><span style="font-size:16px">🔴</span><div style="flex:1"><div style="font-size:13px;color:var(--rd);font-weight:600">Conceded</div></div><div style="font-size:11px;color:var(--mu)">${e.min}'</div></div>`).join('')}`:''}
    ${subs.length>0?`<div class="sect"><span>SUBSTITUTIONS</span><div class="sect-line"></div></div>${subs.map(s=>{const outp=S.players.find(p=>p.id===s.outId);const inp=S.players.find(p=>p.id===s.inId);return`<div class="event-card"><span style="font-size:14px">🔄</span><div style="flex:1;font-size:12px"><span style="color:var(--gn);font-weight:600">↑${esc(inp?.name.split(' ')[0]||'?')}</span><span style="color:var(--rd);font-weight:600;margin-left:6px">↓${esc(outp?.name.split(' ')[0]||'?')}</span></div><div style="font-size:11px;color:var(--mu)">${s.min}'</div></div>`;}).join('')}`:''}
    <div class="sect"><span>PLAYING TIME — tap to add IDP note</span><div class="sect-line"></div></div>
    <div style="font-size:11px;color:var(--mu);margin-bottom:10px;line-height:1.5">Notes save to each player's profile and build their development plan.</div>
    ${sorted.map(({pid,player,mins})=>{
      const pGoals=us.filter(e=>e.scorerId===pid).length;
      const pAssists=us.filter(e=>e.assistId===pid).length;
      const isExpanded=S.expandedPtPlayer===pid;
      const profile=PROFILES[player.pos];
      const isStarter=g.starters.includes(pid);
      const subOutEv=subs.find(s=>s.outId===pid);
      const subInEv=subs.find(s=>s.inId===pid);
      return`<div class="pt-player-card">
        <div class="pt-player-hdr" onclick="togglePtPlayer('${pid}')">
          <div class="player-avatar" style="background:${posColor(player.pos)}">${esc(player.jersey)}</div>
          <div style="flex:1"><div class="player-name">${esc(player.name)}</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:2px"><span style="font-size:11px;color:var(--mu)">${esc(profile?.label||player.pos)}</span>${isStarter?`<span class="badge" style="background:var(--gnl);color:var(--gn)">Starter</span>`:`<span class="badge" style="background:var(--aml);color:var(--am)">Sub</span>`}${subOutEv?`<span style="font-size:10px;color:var(--mu)">Off ${subOutEv.min}'</span>`:''}${subInEv?`<span style="font-size:10px;color:var(--mu)">On ${subInEv.min}'</span>`:''}</div></div>
          <div style="text-align:right"><div style="font-size:24px;font-weight:700;color:var(--nv)">${mins}'</div><div style="font-size:9px;color:var(--su)">played</div></div>
          <span style="font-size:12px;color:var(--mu);margin-left:8px">${isExpanded?'▲':'▼'}</span>
        </div>
        ${pGoals>0||pAssists>0?`<div style="display:flex;gap:7px;margin-top:8px">${pGoals>0?`<div style="background:var(--gnl);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--gn)">⚽ ${pGoals}</div>`:''} ${pAssists>0?`<div style="background:var(--bll);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--bl)">🅰️ ${pAssists}</div>`:''}</div>`:''}
        ${isExpanded?`<div class="pt-expand">
          ${profile?`<div style="font-size:10px;font-weight:700;color:${profile.color};letter-spacing:0.5px;margin-bottom:7px">${profile.label.toUpperCase()} POSITIONAL PROFILE</div><div style="background:${profile.bg};border-radius:9px;padding:10px 11px;margin-bottom:12px;border:0.5px solid ${profile.color}33">${profile.behaviors.map((b,i)=>`<div class="profile-behavior"><span class="profile-num" style="color:${profile.color}">${i+1}</span><span class="profile-text">${esc(b)}</span></div>`).join('')}</div>`:''}
          <div class="field-label">IDP NOTE — saves to player profile</div>
          <textarea placeholder="What did you observe from ${esc(player.name.split(' ')[0])} today? Reference the positional behaviors above." oninput="setIdpNote('${pid}',this.value)">${esc(S.idpNotes[pid]||'')}</textarea>
          ${player.games?.length>0?`<div class="prev-notes"><div class="prev-notes-lbl">PREVIOUS GAMES</div>${player.games.slice(-3).reverse().map(g=>`<div style="font-size:11px;color:var(--tx);margin-bottom:5px;padding-bottom:5px;border-bottom:0.5px solid #fcd34d33"><strong>${esc(g.date)}</strong> vs ${esc(g.opponent)}<span style="color:${g.result==='Won'?'var(--gn)':g.result==='Lost'?'var(--rd)':'var(--am)'}" > ${g.result}</span><span style="color:var(--mu)"> · ${g.mins}'</span>${g.goals>0?`<span style="color:var(--gn)"> ${g.goals}G</span>`:''}${g.assists>0?`<span style="color:var(--bl)"> ${g.assists}A</span>`:''}${g.note?`<div style="color:var(--mu);font-style:italic;margin-top:2px">"${esc(g.note)}"</div>`:''}</div>`).join('')}</div>`:''}
        </div>`:''}
      </div>`;
    }).join('')}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="saveToProfiles()" style="flex:2;padding:14px;background:${S.ptSaved?'var(--gn)':'var(--nv)'};border-radius:11px;color:${S.ptSaved?'#fff':'var(--gd)'};font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit;transition:all 0.3s">${S.ptSaved?'✓ Saved to profiles':'Save to player profiles'}</button>
      <button onclick="newGame()" class="btn-outline" style="flex:1">New game</button>
    </div>
  `;
}

// ─── ROSTER ───────────────────────────────────────────────────────────────────
function buildRoster(){
  if(S.players.length===0)return`<div class="empty-state"><div style="font-size:44px">👥</div><div style="font-size:16px;font-weight:700;color:var(--mu);margin-top:12px;margin-bottom:6px">No players yet</div><div style="font-size:12px;color:var(--su);line-height:1.6;margin-bottom:20px">Add your squad to get started. You'll build game day lineups from your roster.</div><button class="btn-primary" style="max-width:220px;margin:0 auto" onclick="openAddPlayer()">Add first player</button></div>`;
  let html=`<div class="grid3" style="margin-bottom:14px">${[['Players',S.players.length,'var(--nv)'],['GK',S.players.filter(p=>p.pos==='GK').length,'#6D28D9'],['DEF',S.players.filter(p=>p.pos==='DEF').length,'var(--bl)'],['MID',S.players.filter(p=>p.pos==='MID').length,'var(--gn)'],['FWD',S.players.filter(p=>p.pos==='FWD').length,'var(--rd)']].slice(0,3).map(([l,v,c])=>`<div class="stat-box"><div class="stat-val" style="color:${c}">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}</div>`;
  ['GK','DEF','MID','FWD'].forEach(pos=>{
    const g=S.players.filter(p=>p.pos===pos).sort((a,b)=>(parseInt(a.jersey)||99)-(parseInt(b.jersey)||99));
    if(!g.length)return;
    html+=`<div style="font-size:10px;font-weight:700;color:${posColor(pos)};letter-spacing:0.5px;margin-bottom:8px">${posLabel(pos).toUpperCase()} · ${g.length}</div>`;
    g.forEach(p=>{
      const pGames=p.games||[];const totalMins=pGames.reduce((t,g)=>t+(g.mins||0),0);const totalGoals=pGames.reduce((t,g)=>t+(g.goals||0),0);
      html+=`<div class="player-card"><div class="player-avatar" style="background:${posColor(p.pos)}">${esc(p.jersey)}</div><div style="flex:1"><div class="player-name">${esc(p.name)}</div><div class="player-meta">${posLabel(p.pos)}${p.age?` · Age ${p.age}`:''}</div>${p.notes?`<div style="font-size:10px;color:var(--su);margin-top:1px;font-style:italic">${esc(p.notes)}</div>`:''} ${pGames.length>0?`<div style="font-size:10px;color:var(--mu);margin-top:3px">${pGames.length} game${pGames.length!==1?'s':''} · ${totalMins}'${totalGoals>0?` · ${totalGoals}G`:''}</div>`:''}</div><div style="display:flex;gap:5px"><button onclick="editPlayer('${p.id}')" style="padding:6px 12px;border-radius:6px;border:0.5px solid var(--br);cursor:pointer;font-size:11px;color:var(--mu);background:var(--sf);font-family:inherit">Edit</button><button onclick="removePlayer('${p.id}')" style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--rd);background:var(--rdl);border:none;font-family:inherit">✕</button></div></div>`;
    });
  });
  html+=`<div class="sect"><span>${S.players.length} players</span><div class="sect-line"></div><button class="sect-btn" onclick="openAddPlayer()">+ Add player</button></div>`;
  return html;
}

// ─── PROFILES ─────────────────────────────────────────────────────────────────
function buildProfiles(){
  if(S.players.length===0)return`<div class="empty-state"><div style="font-size:44px">👤</div><div style="font-size:16px;font-weight:700;color:var(--mu);margin-top:12px;margin-bottom:6px">No profiles yet</div><div style="font-size:12px;color:var(--su);line-height:1.6">Add players and play some games to build development profiles.</div></div>`;
  let html='';
  ['GK','DEF','MID','FWD'].forEach(pos=>{
    const g=S.players.filter(p=>p.pos===pos).sort((a,b)=>(parseInt(a.jersey)||99)-(parseInt(b.jersey)||99));
    if(!g.length)return;
    html+=`<div style="font-size:10px;font-weight:700;color:${posColor(pos)};letter-spacing:0.5px;margin-bottom:8px;margin-top:14px">${posLabel(pos).toUpperCase()} · ${g.length}</div>`;
    g.forEach(p=>{
      const pGames=p.games||[];const totalMins=pGames.reduce((t,gg)=>t+(gg.mins||0),0);const totalGoals=pGames.reduce((t,gg)=>t+(gg.goals||0),0);const totalAssists=pGames.reduce((t,gg)=>t+(gg.assists||0),0);
      const profile=PROFILES[p.pos];const recentNote=pGames.slice(-1)[0]?.note;const isOpen=S.openProfileId===p.id;
      html+=`<div class="profile-card" onclick="toggleProfile('${p.id}')">
        <div style="display:flex;align-items:center;gap:10px"><div class="player-avatar" style="background:${posColor(p.pos)}">${esc(p.jersey)}</div><div style="flex:1"><div class="player-name">${esc(p.name)}</div><div class="player-meta">${posLabel(p.pos)}${p.age?` · Age ${p.age}`:''}</div></div><div style="text-align:right">${pGames.length>0?`<div style="font-size:13px;font-weight:600;color:var(--nv)">${pGames.length} game${pGames.length!==1?'s':''}</div><div style="font-size:10px;color:var(--mu)">${totalMins}' played</div>`:`<div style="font-size:11px;color:var(--su)">No games</div>`}</div><span style="font-size:12px;color:var(--mu);margin-left:8px">${isOpen?'▲':'▼'}</span></div>
        ${totalGoals>0||totalAssists>0?`<div style="display:flex;gap:7px;margin-top:8px">${totalGoals>0?`<div style="background:var(--gnl);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--gn)">⚽ ${totalGoals}</div>`:''}${totalAssists>0?`<div style="background:var(--bll);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--bl)">🅰️ ${totalAssists}</div>`:''}<div style="background:var(--sf);border-radius:7px;padding:3px 9px;font-size:11px;color:var(--mu)">${totalMins}' total</div></div>`:''}
        ${isOpen?`<div style="padding-top:12px;margin-top:10px;border-top:0.5px solid var(--br)">
          ${profile?`<div style="font-size:10px;font-weight:700;color:${profile.color};letter-spacing:0.5px;margin-bottom:7px">${profile.label.toUpperCase()} POSITIONAL PROFILE</div><div style="background:${profile.bg};border-radius:9px;padding:10px 12px;margin-bottom:12px;border:0.5px solid ${profile.color}22">${profile.behaviors.map((b,i)=>`<div class="profile-behavior"><span class="profile-num" style="color:${profile.color}">${i+1}</span><span class="profile-text">${esc(b)}</span></div>`).join('')}</div>`:''}
          ${p.notes?`<div style="background:#FFFBEB;border-radius:8px;padding:8px 11px;margin-bottom:10px;border:0.5px solid #fcd34d"><div style="font-size:10px;font-weight:700;color:var(--am);margin-bottom:3px">COACH NOTES</div><div style="font-size:12px;color:var(--tx);line-height:1.5;font-style:italic">"${esc(p.notes)}"</div></div>`:''}
          ${recentNote?`<div style="background:var(--bll);border-radius:8px;padding:8px 11px;margin-bottom:10px;border:0.5px solid rgba(37,99,235,0.2)"><div style="font-size:10px;font-weight:700;color:var(--bl);margin-bottom:3px">MOST RECENT IDP NOTE</div><div style="font-size:12px;color:var(--tx);line-height:1.5;font-style:italic">"${esc(recentNote)}"</div><div style="font-size:10px;color:var(--mu);margin-top:3px">From: ${esc(pGames.slice(-1)[0]?.date)} vs ${esc(pGames.slice(-1)[0]?.opponent)}</div></div>`:''}
          ${pGames.length>0?`<div style="font-size:10px;font-weight:700;color:var(--mu);letter-spacing:0.5px;margin-bottom:8px">GAME HISTORY</div>${pGames.slice().reverse().map(gg=>`<div class="game-row"><div class="result-dot" style="background:${gg.result==='Won'?'var(--gnl)':gg.result==='Lost'?'var(--rdl)':'var(--aml)'};color:${gg.result==='Won'?'var(--gn)':gg.result==='Lost'?'var(--rd)':'var(--am)'}">${gg.result==='Won'?'W':gg.result==='Lost'?'L':'D'}</div><div style="flex:1"><div style="font-weight:600;color:var(--tx)">${esc(gg.date)} · ${esc(gg.opponent)}</div><div style="color:var(--mu);font-size:10px">${gg.mins}' played${gg.goals>0?` · ${gg.goals}G`:''}${gg.assists>0?` ${gg.assists}A`:''}</div></div>${gg.note?`<div style="font-size:10px;color:var(--bl);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic">"${esc(gg.note)}"</div>`:''}</div>`).join('')}`:`<div style="font-size:11px;color:var(--su);font-style:italic;text-align:center;padding:10px 0">No games played yet.</div>`}
        </div>`:''}
      </div>`;
    });
  });
  return html;
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function buildHistory(){
  if(S.games.length===0)return`<div class="empty-state"><div style="font-size:44px">📅</div><div style="font-size:16px;font-weight:700;color:var(--mu);margin-top:12px;margin-bottom:6px">No games yet</div><div style="font-size:12px;color:var(--su)">Complete a game in the Game Day tab to see history here.</div></div>`;
  const wins=S.games.filter(g=>g.result==='Won').length;
  let html=`<div class="grid3" style="margin-bottom:14px"><div class="stat-box"><div class="stat-val" style="color:var(--nv)">${S.games.length}</div><div class="stat-lbl">Games</div></div><div class="stat-box"><div class="stat-val" style="color:var(--gn)">${wins}</div><div class="stat-lbl">Wins</div></div><div class="stat-box"><div class="stat-val" style="color:var(--gd)">${S.games.length?Math.round(wins/S.games.length*100)+'%':'—'}</div><div class="stat-lbl">Win %</div></div></div>`;
  S.games.slice().reverse().forEach(g=>{
    const us=g.log.filter(e=>e.type==='goal'&&e.team==='us').length;const them=g.log.filter(e=>e.type==='goal'&&e.team==='them').length;
    const subs=g.log.filter(e=>e.type==='sub');const ptimes=g.pt||{};const isOpen=S.openProfileId===g.id;
    const rc=g.result==='Won'?'var(--gn)':g.result==='Lost'?'var(--rd)':'var(--am)';const rbg=g.result==='Won'?'var(--gnl)':g.result==='Lost'?'var(--rdl)':'var(--aml)';
    html+=`<div class="card" style="cursor:pointer" onclick="toggleProfile('${g.id}')"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:2px">vs ${esc(g.opponent)}</div><div style="font-size:11px;color:var(--mu)">${esc(g.date)} · ${g.format} · ${g.formation}</div></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:20px;font-weight:700;color:${rc}">${us}–${them}</div><span class="badge" style="background:${rbg};color:${rc}">${g.result}</span></div></div>
    ${isOpen?`<div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--br)">${g.gameGoals?.filter(Boolean).length>0?`<div style="margin-bottom:8px"><div class="field-label" style="margin-bottom:4px">GAME GOALS</div>${g.gameGoals.filter(Boolean).map(gg=>`<div style="font-size:11px;color:var(--tx);margin-bottom:2px">· ${esc(gg)}</div>`).join('')}</div>`:''} ${g.log.filter(e=>e.type==='goal'&&e.team==='us').length>0?`<div style="margin-bottom:8px"><div class="field-label" style="margin-bottom:4px">GOALS</div>${g.log.filter(e=>e.type==='goal'&&e.team==='us').map(e=>{const sc=S.players.find(p=>p.id===e.scorerId);const as=S.players.find(p=>p.id===e.assistId);return`<div style="font-size:11px;color:var(--tx);margin-bottom:2px">⚽ ${esc(sc?.name||'?')} ${e.min}'${as?` · 🅰️${esc(as.name.split(' ')[0])}`:''}  </div>`;}).join('')}</div>`:''} ${subs.length>0?`<div style="margin-bottom:8px"><div class="field-label" style="margin-bottom:4px">SUBSTITUTIONS</div>${subs.map(s=>{const outp=S.players.find(p=>p.id===s.outId);const inp=S.players.find(p=>p.id===s.inId);return`<div style="font-size:11px;color:var(--tx);margin-bottom:2px">🔄 ${esc(inp?.name.split(' ')[0]||'?')} ↑ · ${esc(outp?.name.split(' ')[0]||'?')} ↓ · ${s.min}'</div>`;}).join('')}</div>`:''} <div><div class="field-label" style="margin-bottom:5px">PLAYING TIME</div><div style="display:flex;flex-wrap:wrap;gap:5px">${Object.entries(ptimes).sort((a,b)=>b[1]-a[1]).map(([pid,secs])=>{const p=S.players.find(x=>x.id===pid);if(!p)return'';return`<div class="chip"><div class="chip-jersey" style="background:${posColor(p.pos)}">${esc(p.jersey)}</div><span class="chip-name">${esc(p.name.split(' ')[0])}</span><span style="font-size:10px;font-weight:700;color:var(--nv);margin-left:2px">${Math.round(secs/60)}'</span></div>`;}).join('')}</div></div></div>`:''}
    </div>`;
  });
  return html;
}

// ─── ALL MODALS ───────────────────────────────────────────────────────────────
function buildModals(){
  let html='';

  if(S.showSettings) return buildSettings();

  if(S.pickerSlot!==null){
    const fmt=FORMATS[S.format]||FORMATS['11v11'];const slots=fmt.formations[S.formation]||Object.values(fmt.formations)[0];const slot=slots.find(s=>s.id===S.pickerSlot);const assigned=Object.values(S.lineup).filter(Boolean);const currentPid=S.lineup[S.pickerSlot];
    html+=`<div class="modal-overlay" onclick="closePicker()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-hdr"><div class="modal-title">Assign player</div><button class="modal-close" onclick="closePicker()">✕</button></div>
      <div style="font-size:11px;color:var(--mu);margin-bottom:12px">Slot: ${esc(slot?.l||S.pickerSlot)}</div>
      ${currentPid?`<div class="clear-slot" onclick="clearSlot()"><span style="font-size:16px">🚫</span><div><div style="font-size:13px;font-weight:600;color:var(--rd)">Clear position</div><div style="font-size:11px;color:var(--mu)">Remove ${esc(S.players.find(p=>p.id===currentPid)?.name||'')}</div></div></div>`:''}
      ${['GK','DEF','MID','FWD'].map(pos=>{const g=S.players.filter(p=>p.pos===pos&&(!assigned.includes(p.id)||p.id===currentPid));if(!g.length)return'';return`<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:700;color:${posColor(pos)};letter-spacing:0.5px;margin-bottom:7px">${posLabel(pos).toUpperCase()}</div><div class="grid2">${g.map(p=>{const isCur=p.id===currentPid;const isUsed=assigned.includes(p.id)&&!isCur;return`<div class="picker-player ${isCur?'selected':''} ${isUsed?'used':''}" onclick="${isUsed?'':'pickPlayer(\''+p.id+'\')'}"><div style="font-size:14px;font-weight:700;color:${isCur?'#1e40af':posColor(p.pos)}">${esc(p.jersey)}</div><div style="font-size:12px;font-weight:600;color:${isCur?'#1e40af':'var(--tx)'}">${esc(p.name)}</div><div style="font-size:9px;color:var(--su)">${esc(p.pos)}${isUsed?' · Lineup':''}</div></div>`;}).join('')}</div></div>`;}).join('')}
    </div></div>`;
  }

  if(S.showAddPlayer){
    html+=`<div class="modal-overlay" onclick="closeAddPlayer()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-hdr"><div class="modal-title">${S.editPlayerId?'Edit player':'Add player'}</div><button class="modal-close" onclick="closeAddPlayer()">✕</button></div>
      <div class="grid2" style="margin-bottom:10px"><div><div class="field-label">FULL NAME *</div><input type="text" value="${esc(S.formName)}" placeholder="Player name" oninput="S.formName=this.value"/></div><div><div class="field-label">JERSEY</div><input type="number" value="${esc(S.formJersey)}" placeholder="9" oninput="S.formJersey=this.value" style="text-align:center"/></div></div>
      <div style="margin-bottom:10px"><div class="field-label" style="margin-bottom:7px">POSITION</div><div style="display:flex;gap:6px">${['GK','DEF','MID','FWD'].map(pos=>`<div class="pos-btn" style="background:${S.formPos===pos?posColor(pos):'var(--sf)'};color:${S.formPos===pos?'#fff':'var(--mu)'}" onclick="S.formPos='${pos}';render()">${pos}</div>`).join('')}</div></div>
      <div class="grid2" style="margin-bottom:10px"><div><div class="field-label">AGE</div><input type="number" value="${esc(S.formAge)}" placeholder="12" oninput="S.formAge=this.value" style="text-align:center"/></div><div></div></div>
      <div style="margin-bottom:16px"><div class="field-label">COACH NOTES (optional)</div><input type="text" value="${esc(S.formNotes)}" placeholder="Strengths, development focus…" oninput="S.formNotes=this.value"/></div>
      <div style="display:flex;gap:8px"><button onclick="closeAddPlayer()" class="btn-outline" style="flex:1">Cancel</button><button onclick="savePlayer()" style="flex:2;padding:12px;background:${S.formName.trim()?'var(--nv)':'#e5e7eb'};border-radius:8px;color:${S.formName.trim()?'var(--gd)':'#9ca3af'};font-weight:700;font-size:14px;cursor:${S.formName.trim()?'pointer':'default'};border:none;font-family:inherit">${S.editPlayerId?'Save changes':'Add to roster'}</button></div>
    </div></div>`;
  }

  if(S.showSubPlanAdd){
    const assigned=Object.values(S.lineup).filter(Boolean);const bench=S.players.filter(p=>!assigned.includes(p.id));
    html+=`<div class="modal-overlay" onclick="closeSubPlanAdd()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-hdr"><div class="modal-title">Planned substitution</div><button class="modal-close" onclick="closeSubPlanAdd()">✕</button></div>
      <div style="margin-bottom:10px"><div class="field-label">MINUTE</div><input type="number" value="${esc(S.spMin)}" placeholder="e.g. 60" oninput="S.spMin=this.value"/></div>
      <div style="margin-bottom:10px"><div class="field-label" style="color:var(--rd)">PLAYER OFF</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:5px">${assigned.map(pid=>{const p=S.players.find(x=>x.id===pid);if(!p)return'';return`<div class="pill-btn" style="background:${S.spOutId===pid?'var(--rdl)':'var(--sf)'};color:${S.spOutId===pid?'var(--rd)':'var(--tx)'};border:0.5px solid ${S.spOutId===pid?'var(--rd)':'var(--br)'}" onclick="S.spOutId='${pid}';render()">${esc(p.name.split(' ')[0])}</div>`;}).join('')}</div></div>
      <div style="margin-bottom:10px"><div class="field-label" style="color:var(--gn)">PLAYER ON</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:5px">${bench.map(p=>`<div class="pill-btn" style="background:${S.spInId===p.id?'var(--gnl)':'var(--sf)'};color:${S.spInId===p.id?'var(--gn)':'var(--tx)'};border:0.5px solid ${S.spInId===p.id?'var(--gn)':'var(--br)'}" onclick="S.spInId='${p.id}';render()">${esc(p.name.split(' ')[0])}</div>`).join('')}</div></div>
      <div style="margin-bottom:14px"><div class="field-label">REASON (optional)</div><input type="text" value="${esc(S.spReason)}" placeholder="e.g. Fresh legs, tactical change…" oninput="S.spReason=this.value"/></div>
      <button onclick="saveSubPlan()" style="width:100%;padding:12px;background:${S.spOutId&&S.spInId?'var(--nv)':'#e5e7eb'};border-radius:9px;color:${S.spOutId&&S.spInId?'var(--gd)':'#9ca3af'};font-weight:700;font-size:14px;cursor:${S.spOutId&&S.spInId?'pointer':'default'};border:none;font-family:inherit">Add to sub plan</button>
    </div></div>`;
  }

  if(S.showSubModal){
    const onFieldArr=[...S.onField];const benchLive=S.players.filter(p=>!S.onField.has(p.id));const min=Math.floor(S.gameSecs/60);
    html+=`<div class="modal-overlay" onclick="closeSubModal()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-hdr"><div class="modal-title">Substitution — ${min}'</div><button class="modal-close" onclick="closeSubModal()">✕</button></div>
      <div style="margin-bottom:12px"><div class="field-label" style="color:var(--rd);margin-bottom:7px">PLAYER OFF</div><div class="grid3">${onFieldArr.map(pid=>{const p=S.players.find(x=>x.id===pid);if(!p)return'';const sel=S.lsOutId===pid;return`<div class="sel-btn" style="background:${sel?'var(--rdl)':'var(--sf)'};border:${sel?'1.5px':'0.5px'} solid ${sel?'var(--rd)':'var(--br)'}" onclick="S.lsOutId='${pid}';render()"><div style="font-size:14px;font-weight:700;color:${sel?'var(--rd)':'var(--nv)'}">${esc(p.jersey)}</div><div style="font-size:11px;font-weight:600;color:${sel?'var(--rd)':'var(--tx)'}">${esc(p.name.split(' ')[0])}</div><div style="font-size:9px;color:var(--su)">${esc(p.pos)}</div></div>`;}).join('')}</div></div>
      <div style="margin-bottom:16px"><div class="field-label" style="color:var(--gn);margin-bottom:7px">PLAYER ON — bench (${benchLive.length})</div>${benchLive.length===0?`<div style="font-size:12px;color:var(--mu);font-style:italic;text-align:center;padding:10px 0">No bench players available</div>`:`<div class="grid3">${benchLive.map(p=>{const sel=S.lsInId===p.id;return`<div class="sel-btn" style="background:${sel?'var(--gnl)':'var(--sf)'};border:${sel?'1.5px':'0.5px'} solid ${sel?'var(--gn)':'var(--br)'}" onclick="S.lsInId='${p.id}';render()"><div style="font-size:14px;font-weight:700;color:${sel?'var(--gn)':'var(--nv)'}">${esc(p.jersey)}</div><div style="font-size:11px;font-weight:600;color:${sel?'var(--gn)':'var(--tx)'}">${esc(p.name.split(' ')[0])}</div><div style="font-size:9px;color:var(--su)">${esc(p.pos)}</div></div>`;}).join('')}</div>`}</div>
      <button onclick="confirmSub()" style="width:100%;padding:14px;background:${S.lsOutId&&S.lsInId?'var(--nv)':'#e5e7eb'};border-radius:9px;color:${S.lsOutId&&S.lsInId?'var(--gd)':'#9ca3af'};font-weight:700;font-size:15px;cursor:${S.lsOutId&&S.lsInId?'pointer':'default'};border:none;font-family:inherit">Confirm substitution</button>
    </div></div>`;
  }

  if(S.showGoalModal){
    const onFieldArr=[...S.onField];const min=Math.floor(S.gameSecs/60);
    html+=`<div class="modal-overlay" onclick="closeGoalModal()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-hdr"><div class="modal-title">${S.lgTeam==='us'?'⚽ Goal scored':'🔴 Goal conceded'} — ${min}'</div><button class="modal-close" onclick="closeGoalModal()">✕</button></div>
      ${S.lgTeam==='us'?`<div style="margin-bottom:12px"><div class="field-label" style="margin-bottom:7px">SCORER</div><div class="grid4">${onFieldArr.filter(pid=>{const p=S.players.find(x=>x.id===pid);return p&&p.pos!=='GK';}).map(pid=>{const p=S.players.find(x=>x.id===pid);const sel=S.lgScorerId===pid;return`<div class="sel-btn" style="background:${sel?'#EBF4FF':'var(--sf)'};border:${sel?'1.5px':'0.5px'} solid ${sel?'#93c5fd':'var(--br)'}" onclick="S.lgScorerId='${pid}';render()"><div style="font-size:14px;font-weight:700;color:${sel?'#1e40af':'var(--nv)'}">${esc(p.jersey)}</div><div style="font-size:10px;font-weight:600;color:${sel?'#1e40af':'var(--tx)'}">${esc(p.name.split(' ')[0])}</div></div>`;}).join('')}</div></div><div style="margin-bottom:16px"><div class="field-label" style="margin-bottom:7px">ASSIST (optional)</div><div style="display:flex;flex-wrap:wrap;gap:6px">${onFieldArr.filter(pid=>pid!==S.lgScorerId).map(pid=>{const p=S.players.find(x=>x.id===pid);if(!p)return'';const sel=S.lgAssistId===pid;return`<div class="pill-btn" style="background:${sel?'#EBF4FF':'var(--sf)'};color:${sel?'#1e40af':'var(--tx)'};border:0.5px solid ${sel?'#93c5fd':'var(--br)'}" onclick="S.lgAssistId=S.lgAssistId==='${pid}'?'':'${pid}';render()">${esc(p.name.split(' ')[0])}</div>`;}).join('')}<div class="pill-btn" style="background:${!S.lgAssistId?'#EBF4FF':'var(--sf)'};color:${!S.lgAssistId?'#1e40af':'var(--mu)'};border:0.5px solid ${!S.lgAssistId?'#93c5fd':'var(--br)'}" onclick="S.lgAssistId='';render()">No assist</div></div></div>`:''}
      <button onclick="confirmGoal()" style="width:100%;padding:14px;background:${S.lgTeam==='them'||S.lgScorerId?'var(--nv)':'#e5e7eb'};border-radius:9px;color:${S.lgTeam==='them'||S.lgScorerId?'var(--gd)':'#9ca3af'};font-weight:700;font-size:15px;cursor:${S.lgTeam==='them'||S.lgScorerId?'pointer':'default'};border:none;font-family:inherit">Log ${S.lgTeam==='us'?'goal':'conceded'}</button>
    </div></div>`;
  }

  return html;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function toggleTeamEdit(){ S.editingTeam=!S.editingTeam; render(); }
function saveTeamName(){ const el=document.getElementById('team-name-input');if(el&&el.value.trim())S.teamName=el.value.trim();S.editingTeam=false;save();render(); }
function saveTeamNameSettings(){ const el=document.getElementById('team-name-settings');if(el&&el.value.trim())S.teamName=el.value.trim();save();render(); }
function setTab(t){ S.openProfileId=null;S.tab=t;render(); }
function setFormat(f){ const ff=Object.keys(FORMATS[f].formations)[0];S.format=f;S.formation=ff;S.lineup={};render(); }
function setFormation(f){ S.formation=f;S.lineup={};render(); }
function setGameGoal(i,v){ const g=[...S.gameGoals];g[i]=v;S.gameGoals=g; }
function openSettings(){ S.showSettings=true;render(); }
function closeSettings(){ S.showSettings=false;S.restoreStatus='';render(); }
function copyCode(){ if(navigator.clipboard)navigator.clipboard.writeText(S.coachId).then(()=>alert('Sync code copied! Paste it somewhere safe.')).catch(()=>alert('Your sync code: '+S.coachId));else alert('Your sync code: '+S.coachId); }
function openAddPlayer(){ S.showAddPlayer=true;S.editPlayerId=null;S.formName='';S.formJersey='';S.formPos='MID';S.formAge='';S.formNotes='';render(); }
function editPlayer(id){ const p=S.players.find(x=>x.id===id);if(!p)return;S.showAddPlayer=true;S.editPlayerId=id;S.formName=p.name;S.formJersey=p.jersey;S.formPos=p.pos;S.formAge=p.age||'';S.formNotes=p.notes||'';render(); }
function closeAddPlayer(){ S.showAddPlayer=false;S.editPlayerId=null;render(); }
function savePlayer(){ if(!S.formName.trim())return;if(S.editPlayerId)S.players=S.players.map(p=>p.id===S.editPlayerId?{...p,name:S.formName.trim(),jersey:String(S.formJersey),pos:S.formPos,age:S.formAge,notes:S.formNotes}:p);else S.players=[...S.players,{id:uid(),name:S.formName.trim(),jersey:String(S.formJersey),pos:S.formPos,age:S.formAge,notes:S.formNotes,games:[]}];S.showAddPlayer=false;S.editPlayerId=null;save();render(); }
function removePlayer(id){ if(!confirm('Remove this player from the roster?'))return;S.players=S.players.filter(p=>p.id!==id);save();render(); }
function openPicker(slotId){ S.pickerSlot=slotId;render(); }
function closePicker(){ S.pickerSlot=null;render(); }
function pickPlayer(pid){ S.lineup={...S.lineup,[S.pickerSlot]:pid};S.pickerSlot=null;render(); }
function clearSlot(){ const nl={...S.lineup};delete nl[S.pickerSlot];S.lineup=nl;S.pickerSlot=null;render(); }
function openSubPlanAdd(){ S.showSubPlanAdd=true;S.spOutId='';S.spInId='';S.spMin='';S.spReason='';render(); }
function closeSubPlanAdd(){ S.showSubPlanAdd=false;render(); }
function saveSubPlan(){ if(!S.spOutId||!S.spInId)return;S.subPlan=[...S.subPlan,{id:uid(),outId:S.spOutId,inId:S.spInId,min:parseInt(S.spMin)||60,reason:S.spReason}];S.showSubPlanAdd=false;render(); }
function removeSubPlan(id){ S.subPlan=S.subPlan.filter(s=>s.id!==id);render(); }
function startGame(){ const assigned=Object.values(S.lineup).filter(Boolean);if(!assigned.length)return;S.onField=new Set(assigned);S.liveLog=[];S.gameSecs=0;S.confirmEnd=false;S.timerOn=true;S.phase='live';render();startTimer(); }
function toggleTimer(){ if(S.timerOn){stopTimer();S.timerOn=false;}else{S.timerOn=true;startTimer();}render(); }
function showEndConfirm(){ S.confirmEnd=true;render(); }
function hideEndConfirm(){ S.confirmEnd=false;render(); }
function endGame(){
  stopTimer();S.timerOn=false;
  const starters=Object.values(S.lineup).filter(Boolean);
  const pt=computePlayingTime(starters,S.liveLog,S.gameSecs);
  const us=S.liveLog.filter(e=>e.type==='goal'&&e.team==='us').length;
  const them=S.liveLog.filter(e=>e.type==='goal'&&e.team==='them').length;
  const rec={id:uid(),date:S.matchDate||new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),opponent:S.opponent||'Unknown',format:S.format,formation:S.formation,score:{us,them},result:us>them?'Won':us<them?'Lost':'Draw',dur:S.gameSecs,gameGoals:[...S.gameGoals],log:[...S.liveLog],pt,starters};
  S.games=[...S.games,rec];S.activeGameId=rec.id;S.idpNotes={};S.ptSaved=false;S.expandedPtPlayer=null;S.phase='report';S.confirmEnd=false;
  save();render();
}
function openSubModal(){ S.showSubModal=true;S.lsOutId='';S.lsInId='';render(); }
function closeSubModal(){ S.showSubModal=false;render(); }
function confirmSub(){ if(!S.lsOutId||!S.lsInId)return;const min=Math.floor(S.gameSecs/60);S.liveLog=[...S.liveLog,{id:uid(),type:'sub',min,outId:S.lsOutId,inId:S.lsInId}];const nof=new Set(S.onField);nof.delete(S.lsOutId);nof.add(S.lsInId);S.onField=nof;S.showSubModal=false;render(); }
function openGoal(team){ S.showGoalModal=true;S.lgTeam=team;S.lgScorerId='';S.lgAssistId='';render(); }
function closeGoalModal(){ S.showGoalModal=false;render(); }
function confirmGoal(){ if(S.lgTeam==='us'&&!S.lgScorerId)return;const min=Math.floor(S.gameSecs/60);S.liveLog=[...S.liveLog,{id:uid(),type:'goal',min,team:S.lgTeam,scorerId:S.lgScorerId,assistId:S.lgAssistId}];S.showGoalModal=false;render(); }
function togglePtPlayer(pid){ S.expandedPtPlayer=S.expandedPtPlayer===pid?null:pid;render(); }
function setIdpNote(pid,v){ S.idpNotes[pid]=v; }
function saveToProfiles(){
  const g=S.games.find(x=>x.id===S.activeGameId);if(!g)return;
  const us=g.log.filter(e=>e.type==='goal'&&e.team==='us');const pt=g.pt||{};
  S.players=S.players.map(p=>{const mins=Math.round((pt[p.id]||0)/60);if(!mins)return p;const rec={id:g.id,date:g.date,opponent:g.opponent,result:g.result,mins,goals:us.filter(e=>e.scorerId===p.id).length,assists:us.filter(e=>e.assistId===p.id).length,note:S.idpNotes[p.id]||''};return{...p,games:[...(p.games||[]),rec]};});
  S.ptSaved=true;save();render();
}
function newGame(){ S.phase='plan';S.opponent='';S.matchDate='';S.lineup={};S.subPlan=[];S.gameGoals=['','',''];S.liveLog=[];S.gameSecs=0;S.timerOn=false;S.onField=new Set();S.confirmEnd=false;S.activeGameId=null;render(); }
function toggleProfile(id){ S.openProfileId=S.openProfileId===id?null:id;render(); }

// ─── INIT ──────────────────────────────────────────────────────────────────────
load();
if(cloudEnabled()&&S.coachId){
  S.syncStatus='syncing';
  loadFromCloud(S.coachId).then(data=>{
    if(data){
      if(data.players) S.players=data.players;
      if(data.games)   S.games=data.games;
      if(data.teamName)S.teamName=data.teamName;
      S.syncStatus='synced';
    }else{
      S.syncStatus='synced';
      // First time in cloud — push local data up
      if(S.players.length>0||S.games.length>0) scheduleSync();
    }
    render();
  }).catch(()=>{ S.syncStatus='error'; render(); });
}else{
  render();
}
</script>
</body>
</html>
